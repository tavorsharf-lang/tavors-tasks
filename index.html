      </div>

      {/* ── Bar chart ── */}
      <div className="card" style={{marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>📊 ביצוע לפי ימים השבוע</div>
        <div style={{display:'flex',gap:4,alignItems:'flex-end',height:80}}>
          {dayData.map(({name,done:dc})=>(
            <div key={name} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
              <div className="chart-bar" style={{height:`${(dc/maxD)*72}%`,background:dc>0?'var(--accent)':'var(--border)',width:'100%',minHeight:dc>0?4:2}}/>
              <div style={{fontSize:9,color:'var(--text3)'}}>{name.slice(0,2)}</div>
            </div>
          ))}
        </div>
      </div>

      {/* ── Forecast ── */}
      {forecastTasks.length>0&&(
        <div className="card" style={{marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>🔮 חיזוי קצב — מה הסיכויים?</div>
          {forecastTasks.map(t=>{
            const dl=daysLeft(t.deadline);
            const{count,perWeek,recent,lastDate}=getSessionPace(t.id);
            const required=getRequiredPace(t);
            const{color,icon,label}=forecastStatus(perWeek,required,dl);
            const daysLabel=dl<=1?'מחר!':dl<=3?`${dl} ימים!`:`${dl} ימים`;
            return(
              <div key={t.id} style={{padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                  <span style={{fontSize:16}}>{icon}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:700,color:'var(--text)'}}>{t.name}</div>
                    <div style={{fontSize:11,color:'var(--text3)'}}>
                      {t.domain} · דדליין בעוד <span style={{color:dlColor(dl),fontWeight:700}}>{daysLabel}</span>
                    </div>
                  </div>
                  <span style={{background:color,color:'#fff',borderRadius:6,padding:'2px 8px',fontSize:11,fontWeight:700,flexShrink:0}}>{label}</span>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6}}>
                  <div style={{background:'var(--bg2)',borderRadius:6,padding:'6px 8px',textAlign:'center'}}>
                    <div style={{fontSize:18,fontWeight:800,color:'var(--accent2)'}}>{count}</div>
                    <div style={{fontSize:9,color:'var(--text3)'}}>פעמים שעבדת</div>
                  </div>
                  <div style={{background:'var(--bg2)',borderRadius:6,padding:'6px 8px',textAlign:'center'}}>
                    <div style={{fontSize:18,fontWeight:800,color:perWeek>0?'var(--text)':'var(--text3)'}}>
                      {perWeek||0}×
                    </div>
                    <div style={{fontSize:9,color:'var(--text3)'}}>קצב שבועי בפועל</div>
                  </div>
                  <div style={{background:'var(--bg2)',borderRadius:6,padding:'6px 8px',textAlign:'center'}}>
                    <div style={{fontSize:18,fontWeight:800,color:required?'var(--text)':'var(--text3)'}}>
                      {required?required+'×':'—'}
                    </div>
                    <div style={{fontSize:9,color:'var(--text3)'}}>קצב נדרש/שבוע</div>
                  </div>
                </div>
                {count>0&&lastDate&&(
                  <div style={{marginTop:5,fontSize:10,color:'var(--text3)'}}>
                    {recent>0?`${recent} פעמים ב-14 הימים האחרונים`:
                     `עבדת לאחרונה: ${lastDate}`}
                    {required&&perWeek>0&&perWeek<required&&(
                      <span style={{color:'#F97316',fontWeight:600,marginRight:6}}>
                        {' · '}צריך {Math.round((required-perWeek)*10)/10}× יותר לשבוע
                      </span>
                    )}
                  </div>
                )}
                {count===0&&(
                  <div style={{marginTop:5,fontSize:11,color:'#F97316',fontWeight:600}}>
                    ⚠️ לא עבדת על המשימה הזאת עדיין
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* ── Postpone patterns ── */}
      {patterns.length>0&&(
        <div className="card" style={{marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:10,color:'var(--yellow)'}}>⚠️ דפוסי דחייה</div>
          {patterns.map(([name,count])=>(
            <div key={name} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid var(--border)'}}>
              <span style={{fontSize:13}}>דחית "{name}"</span>
              <span style={{fontWeight:700,color:'var(--red)'}}>{count}×</span>
            </div>
          ))}
        </div>
      )}

      {wh.length===0&&history.length===0&&(
        <div className="empty">
          <div style={{fontSize:36,marginBottom:8}}>📭</div>
          <div>אין היסטוריה עדיין</div>
          <div style={{fontSize:12,marginTop:4}}>סמן משימות כבוצעות בלוז היומי</div>
        </div>
      )}
    </div>
  );
}

// ── WEEKLY DAY GRID EDITOR ──────────────────────────────────────────
// Full time-grid editor for a single day inside the weekly schedule,
// mirrors the DailyScheduleScreen grid experience.

function WeeklyDayGrid({tasks,dateKey,entries,setEntries,onBack,dayLabel,dayDate}){
  // Normalize entries: ensure all have startTime/endTime
  function normalize(raw){
    return raw.map(e=>{
      if(e.startTime!=null&&e.endTime!=null){
        const t=e.task||tasks.find(x=>x.id===e.taskId)||null;
        return{...e,done:e.done||false,isBreak:e.isBreak||false,isFixed:e.isFixed||false,isPinned:e.isPinned||false,task:t,note:e.note||''};
      }
      const t=tasks.find(x=>x.id===e.taskId)||null;
      const tm=e.time?parseMin(e.time):9*60;
      const dur=t?taskDur(t):30;
      return{...e,startTime:tm,endTime:tm+dur,done:e.done||false,isBreak:e.isBreak||false,isFixed:e.isFixed||false,isPinned:e.isPinned||false,task:t,note:e.note||''};
    }).sort((a,b)=>a.startTime-b.startTime);
  }

  const items=normalize(entries);
  const [editItem,setEditItem]=useState(null);
  const [quickAdd,setQuickAdd]=useState('');
  const [showAdd,setShowAdd]=useState(false);
  const [draggingId,setDraggingId]=useState(null);
  const [liveItems,setLiveItems]=useState(null);
  const gridDrag=useRef(null);
  const pendingRef=useRef(null);
  const gridRef=useRef(null);
  const [hoverInfo,setHoverInfo]=useState(null);
  const [snapGuideMin,setSnapGuideMin]=useState(null);
  const [snapPulseId,setSnapPulseId]=useState(null);
  const prevSnapMinRef=useRef(null);

  const ds=liveItems||items;
  const dayStartRaw=ds.length?Math.floor((Math.min(...ds.map(i=>i.startTime))-30)/60)*60:420;
  const dayStart=Math.min(dayStartRaw,420);
  const dayEnd=ds.length?Math.max(Math.ceil((Math.max(...ds.map(i=>i.endTime))+90)/60)*60,1380):1380;
  const containerH=(dayEnd-dayStart)*PX;
  const hourLabels=[];
  for(let t=dayStart;t<=dayEnd;t+=60)hourLabels.push(t);
  const overlapLayout=computeOverlapLayout(ds);

  // Persist changes back to weekly plan
  function updateAll(newItems){
    setEntries(newItems.map(it=>({
      id:it.id,taskId:it.taskId||null,name:it.name,
      time:fmtMin(it.startTime),
      startTime:it.startTime,endTime:it.endTime,
      note:it.note||'',done:it.done||false,
      isBreak:it.isBreak||false,isFixed:it.isFixed||false,isPinned:it.isPinned||false,
      layerNote:it.layerNote||null,
    })));
  }

  function toggleDone(id){updateAll(items.map(i=>i.id===id?{...i,done:!i.done}:i));}
  function removeItem(id){updateAll(items.filter(i=>i.id!==id));}
  function addBreak(dur){
    const last=items[items.length-1];
    const st=last?last.endTime:9*60;
    updateAll([...items,{id:uid(),taskId:null,name:`הפסקה (${dur} דקות)`,startTime:st,endTime:st+dur,done:false,isBreak:true,isFixed:false,isPinned:false,task:null,note:''}]);
  }

  // Drag engine
  function startDrag(e,item,type){
    if(type==='move'&&item.isPinned)return;
    e.preventDefault();e.stopPropagation();
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    gridDrag.current={type,id:item.id,startY:clientY,origStart:item.startTime,origDur:item.endTime-item.startTime,origItems:items};
    setDraggingId(item.id);
    setLiveItems(items);
    pendingRef.current=items;
    prevSnapMinRef.current=item.startTime;
  }

  useEffect(()=>{
    function onMove(e){
      if(!gridDrag.current)return;
      if(e.touches)e.preventDefault();
      const{type,id,startY,origStart,origDur,origItems}=gridDrag.current;
      const clientY=e.touches?e.touches[0].clientY:e.clientY;
      const dy=clientY-startY;
      const dmin=Math.round(dy/PX/15)*15;
      const ns=Math.max(0,origStart+dmin);
      if(type==='move'){
        setSnapGuideMin(ns);
        if(ns!==prevSnapMinRef.current){
          prevSnapMinRef.current=ns;
          setSnapPulseId(id);
          setTimeout(()=>setSnapPulseId(p=>p===id?null:p),280);
        }
      }
      const updated=origItems.map(it=>{
        if(it.id!==id)return it;
        if(type==='move')return{...it,startTime:ns,endTime:ns+origDur};
        else{const nd=Math.max(15,origDur+dmin);return{...it,endTime:it.startTime+nd};}
      });
      pendingRef.current=updated;
      setLiveItems(updated);
    }
    function onUp(){
      if(!gridDrag.current)return;
      gridDrag.current=null;
      setDraggingId(null);
      setSnapGuideMin(null);
      prevSnapMinRef.current=null;
      const final=pendingRef.current||items;
      updateAll(final);
      setLiveItems(null);
      pendingRef.current=null;
    }
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
    window.addEventListener('touchmove',onMove,{passive:false});
    window.addEventListener('touchend',onUp);
    window.addEventListener('touchcancel',onUp);
    return()=>{
      window.removeEventListener('mousemove',onMove);
      window.removeEventListener('mouseup',onUp);
      window.removeEventListener('touchmove',onMove);
      window.removeEventListener('touchend',onUp);
      window.removeEventListener('touchcancel',onUp);
    };
  },[]);

  return(
    <div className="fi">
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
        <button className="btn btn-ghost btn-sm" onClick={onBack}>← חזור</button>
        <div style={{flex:1}}>
          <div style={{fontSize:18,fontWeight:800}}>{dayLabel}</div>
          <div style={{fontSize:12,color:'var(--text3)'}}>{dayDate} · {ds.filter(i=>!i.isBreak).length} משימות</div>
        </div>
        <div style={{display:'flex',gap:5}} data-declutter-hide>
          <button className="btn btn-ghost btn-sm" onClick={()=>addBreak(15)}>☕ 15′</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>addBreak(30)}>☕ 30′</button>
        </div>
      </div>

      {/* Quick add */}
      <div data-declutter-hide style={{display:'flex',gap:6,marginBottom:8}}>
        <input value={quickAdd} onChange={e=>setQuickAdd(e.target.value)}
          onKeyDown={e=>{
            if(e.key!=='Enter'||!quickAdd.trim())return;
            const tm=quickAdd.match(/(\d{1,2}):(\d{2})/);
            const stm=tm?parseInt(tm[1])*60+parseInt(tm[2]):(items.length?items[items.length-1].endTime:9*60);
            let dur=30;
            if(quickAdd.includes('שעה וחצי'))dur=90;
            else if(quickAdd.includes('שעתיים'))dur=120;
            else if(quickAdd.includes('שעה'))dur=60;
            else{const dm=quickAdd.match(/(\d+)\s*דקות?/);if(dm)dur=parseInt(dm[1]);}
            const nm=quickAdd.replace(/\d{1,2}:\d{2}/,'').replace(/\d+\s*דקות?/g,'').replace(/שעה[^ ]*/g,'').replace(/שעתיים/g,'').trim()||quickAdd;
            updateAll([...items,{id:uid(),taskId:null,name:nm,startTime:stm,endTime:stm+dur,done:false,isBreak:false,isFixed:false,isPinned:false,task:null,note:''}].sort((a,b)=>a.startTime-b.startTime));
            setQuickAdd('');
          }}
          placeholder="⚡ הוסף מהיר: '10:00 שעה ריאיון' ← Enter"
          style={{fontSize:12,padding:'6px 10px'}}/>
      </div>

      {/* Empty state */}
      {ds.length===0&&(
        <div className="empty" style={{marginBottom:16}}>
          <div style={{fontSize:30,marginBottom:6}}>📭</div>
          <div>אין משימות ליום זה — הוסף מלמטה או גרור מהמאגר</div>
        </div>
      )}

      {/* Time Grid */}
      {ds.length>0&&(
        <div style={{display:'flex',gap:0,userSelect:'none',marginBottom:10}}>
          {/* Hour labels */}
          <div style={{width:40,position:'relative',height:containerH,flexShrink:0}}>
            {hourLabels.map(t=>(
              <div key={t} style={{position:'absolute',top:(t-dayStart)*PX-7,right:0,width:36,
                fontSize:9,color:'var(--text3)',fontWeight:600,textAlign:'left',pointerEvents:'none'}}>
                {fmtMin(t)}
              </div>
            ))}
          </div>

          {/* Grid */}
          <div ref={gridRef}
            onDragOver={e=>{
              if(!e.dataTransfer.types.includes('weeklytaskid'))return;
              e.preventDefault();e.dataTransfer.dropEffect='copy';
            }}
            onDrop={e=>{
              e.preventDefault();
              const tid=parseInt(e.dataTransfer.getData('weeklyTaskId'));
              if(!tid)return;
              const t=tasks.find(x=>x.id===tid);
              if(!t)return;
              const rect=gridRef.current.getBoundingClientRect();
              const y=e.clientY-rect.top;
              const stm=Math.max(dayStart,Math.round((y/PX+dayStart)/15)*15);
              const dur=taskDur(t);
              updateAll([...items,{id:uid(),taskId:t.id,name:t.name,startTime:stm,endTime:stm+dur,done:false,isBreak:false,isFixed:false,isPinned:false,task:t,note:'',layerNote:t.layerable?'להקביל: '+t.layerable:null}].sort((a,b)=>a.startTime-b.startTime));
            }}
            style={{flex:1,position:'relative',height:containerH,background:'var(--bg2)',
              borderRadius:8,overflow:'hidden',border:'1px solid var(--border)'}}>

            {/* Hour grid lines */}
            {hourLabels.map(t=>(
              <div key={t} style={{position:'absolute',top:(t-dayStart)*PX,left:0,right:0,height:1,background:'var(--border)',opacity:.6,pointerEvents:'none'}}/>
            ))}
            {hourLabels.map(t=>(
              (t+30)<=dayEnd&&<div key={t+'h'} style={{position:'absolute',top:(t+30-dayStart)*PX,left:0,right:0,height:1,background:'var(--border)',opacity:.2,pointerEvents:'none'}}/>
            ))}

            {/* Snap guide */}
            {draggingId&&snapGuideMin!==null&&(
              <div style={{position:'absolute',top:(snapGuideMin-dayStart)*PX-1,left:0,right:0,height:2,
                background:'var(--accent)',zIndex:30,opacity:.85,pointerEvents:'none',boxShadow:'0 0 6px var(--accent)'}}>
                <div style={{position:'absolute',right:4,top:-9,fontSize:10,fontWeight:700,
                  color:'var(--accent)',background:'var(--card)',borderRadius:4,padding:'1px 4px',
                  border:'1px solid var(--accent)'}}>
                  {fmtMin(snapGuideMin)}
                </div>
              </div>
            )}

            {/* Task cards */}
            {ds.map(item=>{
              const dur=item.endTime-item.startTime;
              const topPx=(item.startTime-dayStart)*PX;
              const h=Math.max(30,dur*PX);
              const isShort=dur<=20;
              const isDrag=item.id===draggingId;
              const isSnapPulsing=item.id===snapPulseId&&isDrag;
              const t=item.task||tasks.find(x=>x.id===item.taskId);
              const dmgColor=t?DC[t.damageType]:'var(--border)';
              const{col,totalCols}=overlapLayout[item.id]||{col:0,totalCols:1};
              const cardLeft=totalCols===1?3:`calc(${col/totalCols*100}% + 3px)`;
              const cardRight=totalCols===1?3:`calc(${(totalCols-col-1)/totalCols*100}% + 3px)`;
              const cardAnim=isSnapPulsing?'snapPulse .28s ease':undefined;

              return(
                <div key={item.id}
                  onMouseEnter={e=>{if(!draggingId&&!('ontouchstart' in window))setHoverInfo({item:{...item,task:t},x:e.clientX,y:e.clientY});}}
                                    style={{
                    position:'absolute',top:topPx,left:cardLeft,right:cardRight,height:h,
                    background:item.done?'rgba(34,197,94,.08)':'var(--card)',
                    border:item.isPinned?'2px solid #EAB308':`1px solid var(--border)`,
                    borderRight:`3px solid ${dmgColor}`,
                    borderRadius:6,overflow:'visible',
                    cursor:item.isPinned?'default':isDrag?'grabbing':'grab',
                    opacity:item.done?0.45:1,
                    boxShadow:isDrag?'0 8px 32px rgba(31,38,135,.45)':'none',
                    animation:cardAnim,
                    transition:draggingId?'none':'top .18s ease, height .18s ease',
                    zIndex:isDrag?25:1,
                  }}
                  onMouseDown={e=>startDrag(e,item,'move')}
                  onTouchStart={e=>startDrag(e,item,'move')}>

                  {item.isPinned&&<div style={{position:'absolute',top:0,left:0,right:0,height:2,background:'#EAB308'}}/>}

                  <div style={{
                    padding:isShort?'3px 5px':'6px 8px',height:'calc(100% - 8px)',
                    display:'flex',flexDirection:isShort?'row':'column',
                    alignItems:isShort?'center':'flex-start',gap:isShort?5:3,overflow:'hidden',
                  }}>
                    <div style={{fontSize:isShort?9:10,color:'var(--text3)',whiteSpace:'nowrap',flexShrink:0}}>
                      {isShort?fmtMin(item.startTime):`${fmtDuration(dur)} · ${fmtMin(item.startTime)}–${fmtMin(item.endTime)}`}
                    </div>
                    <div style={{
                      fontSize:isShort?11:13,fontWeight:600,
                      color:item.done?'var(--text3)':item.isBreak?'var(--text3)':'var(--text)',
                      textDecoration:item.done?'line-through':'none',
                      whiteSpace:'normal',wordBreak:'break-word',flex:1,
                    }}>
                      {item.isPinned&&<span style={{fontSize:9,marginLeft:3,color:'#EAB308'}}>📌</span>}
                      {item.isBreak?'☕ ':t?domainEmoji(t.domain)+' ':''}{item.name}
                    </div>
                    {!isShort&&(
                      <div style={{display:'flex',gap:3,alignItems:'center',flexWrap:'wrap'}}>
                        {t&&<RBadge rating={t.rating}/>}
                        {t?.deadline&&t.deadline!=='weekly-thursday'&&(
                          <span style={{fontSize:10,color:dlColor(daysLeft(t.deadline)),fontWeight:700}}>⏳{daysLeft(t.deadline)}י</span>
                        )}
                      </div>
                    )}
                    {item.layerNote&&!isShort&&(
                      <div style={{fontSize:10,color:'var(--text3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>🎧 {item.layerNote}</div>
                    )}
                    {item.note&&!isShort&&(
                      <div style={{fontSize:10,color:'var(--accent2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>📝 {item.note}</div>
                    )}
                  </div>

                  {/* Action buttons */}
                  <div style={{position:'absolute',top:isShort?'auto':3,bottom:isShort?10:'auto',left:3,display:'flex',gap:2,zIndex:10}}
                    onMouseDown={e=>e.stopPropagation()}>
                    {!item.isBreak&&(
                      <button className="action-btn" style={{fontSize:18,padding:'4px 6px',opacity:.9,minWidth:34,minHeight:34}}
                        onClick={e=>{e.stopPropagation();toggleDone(item.id);}}>
                        {item.done?'✅':'⬜'}
                      </button>
                    )}
                    <button className="action-btn" style={{fontSize:10,padding:'1px 4px',opacity:.7}}
                      onClick={e=>{e.stopPropagation();setEditItem(item);}}>✏️</button>
                    <button className="action-btn"
                      style={{fontSize:10,padding:'1px 4px',opacity:.7,color:item.isPinned?'#EAB308':'var(--text3)'}}
                      onClick={e=>{e.stopPropagation();
                        updateAll(items.map(i=>i.id===item.id?{...i,isPinned:!i.isPinned}:i));
                      }}>
                      {item.isPinned?'🔓':'🔒'}
                    </button>
                    <button className="action-btn" style={{fontSize:10,padding:'1px 4px',opacity:.7}}
                      onClick={e=>{e.stopPropagation();removeItem(item.id);}}>🗑️</button>
                  </div>

                  {/* Resize handle */}
                  <div style={{position:'absolute',bottom:0,left:0,right:0,height:8,cursor:'ns-resize',background:'transparent',
                    display:'flex',alignItems:'center',justifyContent:'center'}}
                    onMouseDown={e=>{e.stopPropagation();startDrag(e,item,'resize');}}
                    onTouchStart={e=>{e.stopPropagation();startDrag(e,item,'resize');}}>
                    <div style={{width:22,height:2,borderRadius:1,background:'var(--border)'}}/>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Add from repository */}
      <div data-declutter-hide style={{display:'flex',gap:5,marginBottom:8,flexWrap:'wrap'}}>
        <button className="btn btn-primary btn-sm" onClick={()=>setShowAdd(true)}>+ הוסף משימה</button>
        <button className="btn btn-ghost btn-sm" onClick={()=>addBreak(15)}>☕ 15′</button>
        <button className="btn btn-ghost btn-sm" onClick={()=>addBreak(30)}>☕ 30′</button>
        <button className="btn btn-ghost btn-sm" onClick={()=>addBreak(60)}>☕ שעה</button>
      </div>

      {/* Task picker modal */}
      {showAdd&&(
        <div className="modal-overlay" onClick={()=>setShowAdd(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:17,fontWeight:700,marginBottom:14}}>+ הוסף משימה ליום</div>
            <div style={{maxHeight:'60vh',overflowY:'auto',display:'flex',flexDirection:'column',gap:5}}>
              {tasks.map(t=>{
                const inDay=items.some(i=>i.taskId===t.id);
                return(
                  <button key={t.id}
                    onClick={()=>{
                      const st=items.length?items[items.length-1].endTime:9*60;
                      const dur=taskDur(t);
                      updateAll([...items,{id:uid(),taskId:t.id,name:t.name,startTime:st,endTime:st+dur,done:false,isBreak:false,isFixed:false,isPinned:false,task:t,note:'',layerNote:t.layerable?'להקביל: '+t.layerable:null}].sort((a,b)=>a.startTime-b.startTime));
                      setShowAdd(false);
                    }}
                    style={{display:'flex',alignItems:'center',gap:8,padding:'10px 12px',borderRadius:8,
                      border:`1px solid ${inDay?'rgba(34,197,94,.3)':'var(--border)'}`,
                      background:inDay?'rgba(34,197,94,.06)':'var(--card)',
                      cursor:'pointer',textAlign:'right',fontFamily:'inherit',color:'var(--text)',
                      opacity:inDay?.6:1,transition:'.15s'}}>
                    <RBadge rating={t.rating}/>
                    <DDot type={t.damageType}/>
                    <span style={{flex:1,fontSize:13,fontWeight:600}}>{t.name}</span>
                    {inDay&&<span style={{fontSize:10,color:'var(--green)'}}>✓ כבר ביום</span>}
                    {t.deadline&&t.deadline!=='weekly-thursday'&&(
                      <span style={{fontSize:10,color:dlColor(daysLeft(t.deadline)),fontWeight:700}}>⏳{daysLeft(t.deadline)}</span>
                    )}
                  </button>
                );
              })}
            </div>
            <button className="btn btn-ghost" style={{width:'100%',marginTop:10}} onClick={()=>setShowAdd(false)}>סגור</button>
          </div>
        </div>
      )}

      {/* Edit modal */}
      {editItem&&(
        <ScheduleItemEditModal item={editItem} onSave={updated=>{
          updateAll(items.map(i=>i.id===updated.id?{...updated}:i));
          setEditItem(null);
        }} onClose={()=>setEditItem(null)}/>
      )}
    </div>
  );
}

// ── SCREEN 6: WEEKLY SCHEDULE ─────────────────────────────────────────

// weeklyPlan structure: { "2026-04-09": [{taskId, name, time, note}, ...], ... }

function WeeklyScheduleScreen({tasks,setTasks,weeklyPlan,setWeeklyPlan,history,setHistory,parkedItems,setParkedItems,undoFlashTs}){
  const [weekOffset,setWeekOffset]=useState(0);
  const [addModal,setAddModal]=useState(null);
  const [editEntry,setEditEntry]=useState(null);
  const [expandDay,setExpandDay]=useState(null);
  // Cross-day drag state
  const weekDrag=useRef(null); // {entryId, fromDateKey}
  const [dragOverDay,setDragOverDay]=useState(null); // dateKey being hovered

  function moveEntryToDay(toDateKey){
    if(!weekDrag.current)return;
    const{entryId,fromDateKey}=weekDrag.current;
    if(fromDateKey===toDateKey){weekDrag.current=null;setDragOverDay(null);return;}
    setWeeklyPlan(p=>{
      const entry=(p[fromDateKey]||[]).find(e=>e.id===entryId);
      if(!entry)return p;
      return{
        ...p,
        [fromDateKey]:(p[fromDateKey]||[]).filter(e=>e.id!==entryId),
        [toDateKey]:[...(p[toDateKey]||[]),entry],
      };
    });
    weekDrag.current=null;
    setDragOverDay(null);
  }

  const today=new Date();

  // compute week's Sunday based on offset
  function getWeekDays(offset){
    const sunday=new Date(today);
    sunday.setDate(today.getDate()-today.getDay()+offset*7);
    return DAYS.map((name,i)=>{
      const d=new Date(sunday);d.setDate(sunday.getDate()+i);
      const dk=d.toISOString().split('T')[0];
      const isToday=dk===today.toISOString().split('T')[0];
      return{name,date:`${d.getDate()}/${d.getMonth()+1}`,dateKey:dk,isToday,isPast:d<today&&!isToday};
    });
  }
  const days=getWeekDays(weekOffset);

  function weekLabel(){
    if(weekOffset===0)return'השבוע';
    if(weekOffset===1)return'שבוע הבא';
    if(weekOffset===-1)return'שבוע שעבר';
    if(weekOffset>0)return`+${weekOffset} שבועות`;
    return`${weekOffset} שבועות`;
  }

  function addEntry(dateKey,entry){
    setWeeklyPlan(p=>({...p,[dateKey]:[...(p[dateKey]||[]),{...entry,id:uid()}]}));
  }
  function removeEntry(dateKey,id){
    setWeeklyPlan(p=>({...p,[dateKey]:(p[dateKey]||[]).filter(e=>e.id!==id)}));
  }
  function updateEntry(dateKey,updated){
    setWeeklyPlan(p=>({...p,[dateKey]:(p[dateKey]||[]).map(e=>e.id===updated.id?updated:e)}));
  }

  function suggest(){
    const newPlan={...weeklyPlan};
    const pool=[...tasks].filter(t=>['A','B'].includes(t.rating)&&!t.isPhysio&&!t.isDogWalk&&!t.isThursdayOnly);
    const workdays=days.filter((_,i)=>i<5);
    pool.forEach((t,i)=>{
      const day=workdays[i%5];
      if(!newPlan[day.dateKey])newPlan[day.dateKey]=[];
      if(!newPlan[day.dateKey].find(e=>e.taskId===t.id)){
        newPlan[day.dateKey].push({id:uid(),taskId:t.id,name:t.name,time:'09:00',note:''});
      }
    });
    setWeeklyPlan(newPlan);
  }

  if(expandDay){
    const dayObj=days.find(d=>d.dateKey===expandDay);

    // Normalize weekly entries → schedule format
    function weeklyToSchedule(entries){
      return(entries||[]).map(e=>{
        const t=e.task||tasks.find(x=>x.id===e.taskId)||null;
        const tm=e.startTime!=null?e.startTime:(e.time?parseMin(e.time):9*60);
        const dur=e.endTime!=null?e.endTime-tm:(t?taskDur(t):30);
        return{
          id:e.id,taskId:e.taskId||null,name:e.name,
          startTime:tm,endTime:tm+dur,
          done:e.done||false,isBreak:e.isBreak||false,isFixed:e.isFixed||false,
          isPinned:e.isPinned||false,
          layerNote:e.layerNote||null,task:t,note:e.note||'',
          dependsOn:e.dependsOn||null,splitGroup:e.splitGroup||null,
        };
      }).sort((a,b)=>a.startTime-b.startTime);
    }

    // Wrapper: schedule changes → sync back to weeklyPlan for this day
    function setDaySchedule(v){
      setWeeklyPlan(prev=>{
        const current=weeklyToSchedule(prev[expandDay]||[]);
        const next=typeof v==='function'?v(current):v;
        // Convert back to weekly entry format
        const entries=next.map(it=>({
          id:it.id,taskId:it.taskId||null,name:it.name,
          time:fmtMin(it.startTime),startTime:it.startTime,endTime:it.endTime,
          note:it.note||'',done:it.done||false,
          isBreak:it.isBreak||false,isFixed:it.isFixed||false,isPinned:it.isPinned||false,
          layerNote:it.layerNote||null,dependsOn:it.dependsOn||null,splitGroup:it.splitGroup||null,
        }));
        return{...prev,[expandDay]:entries};
      });
    }

    const daySchedule=weeklyToSchedule(weeklyPlan[expandDay]||[]);

    return(
      <div className="fi">
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>setExpandDay(null)}>← חזור לשבועי</button>
          <div>
            <div style={{fontSize:16,fontWeight:800}}>{dayObj?.name} — {dayObj?.date}</div>
            <div style={{fontSize:11,color:'var(--text3)'}}>עריכה מלאה · כל השינויים נשמרים בלוז השבועי</div>
          </div>
        </div>
        <DailyScheduleScreen
          tasks={tasks} setTasks={setTasks}
          schedule={daySchedule} setSchedule={setDaySchedule}
          history={history} setHistory={setHistory} setWeeklyPlan={setWeeklyPlan}
          parkedItems={parkedItems} setParkedItems={setParkedItems}
          undoFlashTs={undoFlashTs} isToday={false}/>
      </div>
    );
  }

  // heat map helpers
  function dayLoad(dateKey){
    const entries=weeklyPlan[dateKey]||[];
    const totalMins=entries.reduce((a,e)=>(e.startTime&&e.endTime?a+(e.endTime-e.startTime):a+30),0);
    return Math.min(100,Math.round(totalMins/(16*60)*100));
  }
  function heatColor(pct){
    if(pct===0)return'rgba(255,255,255,0.04)';
    if(pct<25)return'rgba(34,197,94,0.25)';
    if(pct<50)return'rgba(34,197,94,0.45)';
    if(pct<70)return'rgba(234,179,8,0.45)';
    if(pct<85)return'rgba(249,115,22,0.45)';
    return'rgba(239,68,68,0.55)';
  }
  function heatLabel(pct){
    if(pct===0)return'ריק';
    if(pct<25)return'קל';
    if(pct<50)return'בינוני';
    if(pct<70)return'עמוס';
    if(pct<85)return'כבד';
    return'מלא';
  }

  return(
    <div className="fi">
      {/* header + nav */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>setWeekOffset(w=>w-1)}>← הקודם</button>
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:15,fontWeight:800}}>{weekLabel()}</div>
          <div style={{fontSize:11,color:'var(--text3)'}}>{days[0].date} — {days[6].date}</div>
        </div>
        <button className="btn btn-ghost btn-sm" onClick={()=>setWeekOffset(w=>w+1)}>הבא →</button>
      </div>

      {weekOffset!==0&&(
        <button className="btn btn-ghost btn-sm" style={{marginBottom:10,fontSize:11}} onClick={()=>setWeekOffset(0)}>חזור לשבוע הנוכחי</button>
      )}

      {/* ═══ HEAT MAP STRIP ═══ */}
      <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,padding:'12px 14px',marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:8,letterSpacing:'.5px'}}>🌡️ עומס שבועי</div>
        <div style={{display:'flex',gap:4,direction:'ltr'}}>
          {days.map(({name,dateKey,isToday})=>{
            const pct=dayLoad(dateKey);
            const entries=(weeklyPlan[dateKey]||[]);
            const aCount=entries.filter(e=>{const t=tasks.find(x=>x.id===e.taskId);return t?.rating==='A';}).length;
            return(
              <div key={dateKey} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3,cursor:'pointer'}}
                onClick={()=>setExpandDay(dateKey)}>
                <div style={{fontSize:9,color:isToday?'var(--accent2)':'var(--text3)',fontWeight:isToday?800:500}}>{name.slice(0,3)}</div>
                {/* heat cell */}
                <div style={{
                  width:'100%',height:52,borderRadius:8,
                  background:heatColor(pct),
                  border:`1.5px solid ${isToday?'var(--accent)':'transparent'}`,
                  display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                  gap:2,transition:'background .3s',position:'relative',overflow:'hidden'
                }}>
                  {/* fill bar from bottom */}
                  <div style={{position:'absolute',bottom:0,left:0,right:0,height:pct+'%',
                    background:pct>84?'rgba(239,68,68,.18)':pct>69?'rgba(249,115,22,.14)':pct>49?'rgba(234,179,8,.12)':'rgba(34,197,94,.10)',
                    transition:'height .4s ease'}}/>
                  <div style={{fontSize:15,fontWeight:900,color:'var(--text)',position:'relative',zIndex:1,lineHeight:1}}>{pct>0?pct+'%':'—'}</div>
                  {aCount>0&&<div style={{fontSize:9,background:'rgba(220,38,38,.7)',color:'#fff',borderRadius:4,padding:'0 4px',fontWeight:700,position:'relative',zIndex:1}}>A×{aCount}</div>}
                </div>
                <div style={{fontSize:9,color:'var(--text3)',fontWeight:600}}>{heatLabel(pct)}</div>
              </div>
            );
          })}
        </div>
        {/* legend */}
        <div style={{display:'flex',gap:10,marginTop:10,justifyContent:'center',direction:'ltr'}}>
          {[['ריק','rgba(255,255,255,0.08)'],['קל','rgba(34,197,94,0.45)'],['עמוס','rgba(234,179,8,0.45)'],['מלא','rgba(239,68,68,0.55)']].map(([lbl,c])=>(
            <div key={lbl} style={{display:'flex',alignItems:'center',gap:4}}>
              <div style={{width:10,height:10,borderRadius:3,background:c}}/>
              <span style={{fontSize:10,color:'var(--text3)'}}>{lbl}</span>
            </div>
          ))}
        </div>
      </div>

      <div style={{display:'flex',justifyContent:'flex-end',marginBottom:10}}>
        <button className="btn btn-primary btn-sm" onClick={suggest}>✨ הצע חלוקה</button>
      </div>

      {/* days grid */}
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {days.map(({name,date,dateKey,isToday,isPast})=>{
          const entries=(weeklyPlan[dateKey]||[]).slice().sort((a,b)=>(a.time||'').localeCompare(b.time||''));
          const isDropTarget=dragOverDay===dateKey;
          return(
            <div key={dateKey}
              onDragOver={e=>{e.preventDefault();if(weekDrag.current&&dragOverDay!==dateKey)setDragOverDay(dateKey);}}
              onDragLeave={e=>{if(!e.currentTarget.contains(e.relatedTarget))setDragOverDay(null);}}
              onDrop={e=>{e.preventDefault();moveEntryToDay(dateKey);}}
              style={{
                background:'var(--card)',
                border:`1px solid ${isDropTarget?'var(--accent)':isToday?'var(--accent)':'var(--border)'}`,
                borderRadius:10,overflow:'hidden',
                boxShadow:isDropTarget?'0 0 0 2px rgba(99,102,241,.35)':'none',
                transition:'box-shadow .15s,border-color .15s',
                backgroundImage:(()=>{
                  const pct=dayLoad(dateKey);
                  return pct>0?`linear-gradient(90deg, ${heatColor(pct)} 0%, transparent ${Math.min(pct*1.5,60)}%)`:'none';
                })(),
              }}>
              {/* day header — clickable to expand */}
              <div
                style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 12px',
                  background:isToday?'rgba(99,102,241,.08)':'transparent',cursor:'pointer'}}
                onClick={()=>setExpandDay(dateKey)}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <div style={{fontWeight:700,fontSize:14,color:isToday?'var(--accent2)':isPast?'var(--text3)':'var(--text)'}}>
                    {name}{isToday?' ✦':''}
                  </div>
                  <div style={{fontSize:11,color:'var(--text3)'}}>{date}</div>
                  {entries.length>0&&<div style={{fontSize:11,background:'var(--border)',borderRadius:10,padding:'1px 7px',color:'var(--text2)'}}>{entries.length}</div>}
                  {(()=>{
                    const totalMins=entries.reduce((a,e)=>(e.startTime&&e.endTime?a+(e.endTime-e.startTime):a+30),0);
                    if(!totalMins)return null;
                    const pct=Math.min(100,Math.round(totalMins/(16*60)*100));
                    const c=pct>85?'var(--red)':pct>60?'var(--orange)':'var(--green)';
                    return <div style={{fontSize:10,color:c,fontWeight:700}}>{Math.round(totalMins/60)}ש'</div>;
                  })()}
                </div>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <button className="btn btn-ghost btn-sm" style={{padding:'3px 8px',fontSize:11}}
                    onClick={e=>{e.stopPropagation();setAddModal(dateKey);}}>+ הוסף</button>
                  <span style={{color:'var(--text3)',fontSize:12}}>›</span>
                </div>
              </div>

              {/* Load bar */}
              {entries.length>0&&(()=>{
                const totalMins=entries.reduce((a,e)=>(e.startTime&&e.endTime?a+(e.endTime-e.startTime):a+30),0);
                const pct=Math.min(100,Math.round(totalMins/(16*60)*100));
                const c=pct>85?'var(--red)':pct>60?'var(--orange)':'var(--green)';
                return <div style={{height:2,background:c,width:pct+'%',transition:'width .4s',marginBottom:0}}/>;
              })()}

              {/* entry pills */}
              {entries.length>0&&(
                <div style={{padding:'4px 10px 8px',display:'flex',flexWrap:'wrap',gap:5}}>
                  {entries.map(entry=>(
                    <div key={entry.id}
                      draggable
                      onDragStart={e=>{
                        weekDrag.current={entryId:entry.id,fromDateKey:dateKey};
                        e.dataTransfer.effectAllowed='move';
                        // ghost image: default browser ghost is fine
                      }}
                      onDragEnd={()=>{weekDrag.current=null;setDragOverDay(null);}}
                      style={{display:'inline-flex',alignItems:'center',gap:5,padding:'3px 8px',
                        background:'var(--bg2)',borderRadius:20,fontSize:12,
                        border:'1px solid var(--border)',cursor:'grab',
                        userSelect:'none'}}>
                      <span style={{fontSize:11,color:'var(--text3)',cursor:'grab'}}>⠿</span>
                      {entry.time&&<span style={{color:'var(--accent2)',fontWeight:700,fontSize:11}}>{entry.time}</span>}
                      {entry.taskId&&(()=>{const t=tasks.find(x=>x.id===entry.taskId);return t?<RBadge rating={t.rating}/>:null;})()}
                      <span style={{maxWidth:130,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{entry.name}</span>
                      <button style={{background:'transparent',border:'none',cursor:'pointer',color:'var(--text3)',fontSize:11,padding:0,lineHeight:1}}
                        onClick={e=>{e.stopPropagation();removeEntry(dateKey,entry.id);}}>✕</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {addModal&&<WeeklyAddModal tasks={tasks} onSave={e=>{addEntry(addModal,e);setAddModal(null);}} onClose={()=>setAddModal(null)}/>}
    </div>
  );
}

function WeeklyAddModal({tasks,initial,onSave,onClose}){
  const [sel,setSel]=useState(initial?.taskId?String(initial.taskId):'');
  const [name,setName]=useState(initial?.name||'');
  const [time,setTime]=useState(initial?.time||'09:00');
  const [note,setNote]=useState(initial?.note||'');

  function pickTask(id){
    setSel(id);
    if(id){const t=tasks.find(x=>x.id===Number(id));if(t)setName(t.name);}
    else setName('');
  }
  function save(){
    const t=tasks.find(x=>x.id===Number(sel));
    onSave({id:initial?.id,taskId:t?t.id:null,name:name||t?.name||'',time,note});
  }
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:17,fontWeight:700,marginBottom:14}}>{initial?'✏️ עריכה':'+ הוסף משימה ליום'}</div>
        <div className="form-grid">
          <div>
            <label>בחר ממאגר (אופציונלי)</label>
            <select value={sel} onChange={e=>pickTask(e.target.value)}>
              <option value="">— בחר משימה —</option>
              {tasks.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
            </select>
          </div>
          <div>
            <label>שם (אם לא מהמאגר)</label>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="שם המשימה..."/>
          </div>
          <div>
            <label>שעה</label>
            <input type="time" value={time} onChange={e=>setTime(e.target.value)}/>
          </div>
          <div>
            <label>הערה (אופציונלי)</label>
            <textarea value={note} onChange={e=>setNote(e.target.value)} rows={2} placeholder="תזכורת, פרטים..."/>
          </div>
        </div>
        <div style={{display:'flex',gap:8,marginTop:14}}>
          <button className="btn btn-ghost" onClick={onClose}>ביטול</button>
          <button className="btn btn-primary" onClick={save} disabled={!name&&!sel}>שמור</button>
        </div>
      </div>
    </div>
  );
}

// ── SCREEN: MONTHLY + YEARLY CALENDAR ─────────────────────────────────

function MonthlyYearlyScreen({tasks,setTasks,weeklyPlan,setWeeklyPlan,history,setHistory,parkedItems,setParkedItems,undoFlashTs,setScreen}){
  const [view,setView]=useState('month'); // 'month' or 'year'
  const [expandDay,setExpandDay]=useState(null);
  const today=new Date();
  const [monthOffset,setMonthOffset]=useState(0);

  const MNAMES=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  const DNAMES=['א','ב','ג','ד','ה','ו','ש'];

  function getMonthData(year,month){
    const first=new Date(year,month,1);
    const startDay=first.getDay(); // 0=Sun
    const daysInMonth=new Date(year,month+1,0).getDate();
    const cells=[];
    // Empty cells before first day
    for(let i=0;i<startDay;i++)cells.push(null);
    for(let d=1;d<=daysInMonth;d++)cells.push(d);
    return cells;
  }

  function dayEntries(year,month,day){
    const dk=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    return weeklyPlan[dk]||[];
  }

  function dayKey(year,month,day){
    return`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  }

  // Current viewed month
  const viewDate=new Date(today.getFullYear(),today.getMonth()+monthOffset,1);
  const viewYear=viewDate.getFullYear();
  const viewMonth=viewDate.getMonth();

  // ── Expand day: full DailyScheduleScreen ──
  if(expandDay){
    function weeklyToSchedule(entries){
      return(entries||[]).map(e=>{
        const t=e.task||tasks.find(x=>x.id===e.taskId)||null;
        const tm=e.startTime!=null?e.startTime:(e.time?parseMin(e.time):9*60);
        const dur=e.endTime!=null?e.endTime-tm:(t?taskDur(t):30);
        return{id:e.id,taskId:e.taskId||null,name:e.name,startTime:tm,endTime:tm+dur,
          done:e.done||false,isBreak:e.isBreak||false,isFixed:e.isFixed||false,isPinned:e.isPinned||false,
          layerNote:e.layerNote||null,task:t,note:e.note||'',dependsOn:e.dependsOn||null,splitGroup:e.splitGroup||null};
      }).sort((a,b)=>a.startTime-b.startTime);
    }
    function setDaySchedule(v){
      setWeeklyPlan(prev=>{
        const current=weeklyToSchedule(prev[expandDay]||[]);
        const next=typeof v==='function'?v(current):v;
        const entries=next.map(it=>({
          id:it.id,taskId:it.taskId||null,name:it.name,time:fmtMin(it.startTime),
          startTime:it.startTime,endTime:it.endTime,note:it.note||'',done:it.done||false,
          isBreak:it.isBreak||false,isFixed:it.isFixed||false,isPinned:it.isPinned||false,
          layerNote:it.layerNote||null,dependsOn:it.dependsOn||null,splitGroup:it.splitGroup||null,
        }));
        return{...prev,[expandDay]:entries};
      });
    }
    const daySchedule=weeklyToSchedule(weeklyPlan[expandDay]||[]);
    const parts=expandDay.split('-');
    const expandDate=new Date(Number(parts[0]),Number(parts[1])-1,Number(parts[2]));
    const dayLabel=DAYS[expandDate.getDay()]+' — '+expandDate.getDate()+'/'+Number(parts[1]);

    return(
      <div className="fi">
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>setExpandDay(null)}>← חזור לחודשי</button>
          <div>
            <div style={{fontSize:16,fontWeight:800}}>{dayLabel}</div>
            <div style={{fontSize:11,color:'var(--text3)'}}>עריכה מלאה · כל השינויים נשמרים</div>
          </div>
        </div>
        <DailyScheduleScreen
          tasks={tasks} setTasks={setTasks}
          schedule={daySchedule} setSchedule={setDaySchedule}
          history={history} setHistory={setHistory} setWeeklyPlan={setWeeklyPlan}
          parkedItems={parkedItems} setParkedItems={setParkedItems}
          undoFlashTs={undoFlashTs} isToday={false}/>
      </div>
    );
  }

  if(view==='year'){
    return(
      <div className="fi">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>setView('month')}>← חודשי</button>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <button className="btn btn-ghost btn-sm" onClick={()=>setMonthOffset(o=>o-12)}>←</button>
            <span style={{fontSize:18,fontWeight:900}}>{viewYear}</span>
            <button className="btn btn-ghost btn-sm" onClick={()=>setMonthOffset(o=>o+12)}>→</button>
          </div>
          <div/>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
          {Array.from({length:12},(_,mi)=>{
            const cells=getMonthData(viewYear,mi);
            const isCurrentMonth=viewYear===today.getFullYear()&&mi===today.getMonth();
            // Count tasks this month
            let totalTasks=0;
            cells.forEach(d=>{if(d)totalTasks+=dayEntries(viewYear,mi,d).length;});
            return(
              <div key={mi}
                onClick={()=>{setMonthOffset((viewYear-today.getFullYear())*12+(mi-today.getMonth()));setView('month');}}
                style={{background:'var(--card)',border:`1px solid ${isCurrentMonth?'var(--accent)':'var(--border)'}`,
                  borderRadius:10,padding:'8px',cursor:'pointer',transition:'.15s'}}>
                <div style={{fontSize:12,fontWeight:700,marginBottom:6,color:isCurrentMonth?'var(--accent2)':'var(--text)',
                  display:'flex',justifyContent:'space-between'}}>
                  <span>{MNAMES[mi]}</span>
                  {totalTasks>0&&<span style={{fontSize:10,color:'var(--text3)',background:'var(--bg2)',borderRadius:8,padding:'1px 6px'}}>{totalTasks}</span>}
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:1,fontSize:8}}>
                  {cells.map((d,i)=>{
                    if(!d)return<div key={i}/>;
                    const entries=dayEntries(viewYear,mi,d);
                    const isToday=viewYear===today.getFullYear()&&mi===today.getMonth()&&d===today.getDate();
                    const hasA=entries.some(e=>{const t=tasks.find(x=>x.id===e.taskId);return t?.rating==='A';});
                    const bg=isToday?'var(--accent)':hasA?'rgba(220,38,38,.4)':entries.length>3?'rgba(234,179,8,.3)':entries.length>0?'rgba(34,197,94,.2)':'transparent';
                    return(
                      <div key={i} style={{width:'100%',aspectRatio:'1',display:'flex',alignItems:'center',justifyContent:'center',
                        borderRadius:3,background:bg,color:isToday?'#fff':'var(--text3)',fontWeight:isToday?800:400}}>
                        {d}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // MONTH VIEW
  const cells=getMonthData(viewYear,viewMonth);

  return(
    <div className="fi">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>setMonthOffset(o=>o-1)}>← הקודם</button>
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:18,fontWeight:900}}>{MNAMES[viewMonth]} {viewYear}</div>
          {monthOffset!==0&&<button onClick={()=>setMonthOffset(0)} style={{background:'none',border:'none',color:'var(--accent2)',cursor:'pointer',fontSize:11,fontFamily:'inherit'}}>חזור להיום</button>}
        </div>
        <button className="btn btn-ghost btn-sm" onClick={()=>setMonthOffset(o=>o+1)}>הבא →</button>
      </div>

      <div style={{display:'flex',gap:6,marginBottom:10}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>setView('year')}>📅 תצוגה שנתית</button>
      </div>

      {/* Day headers */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4,marginBottom:4}}>
        {DNAMES.map(d=>(
          <div key={d} style={{textAlign:'center',fontSize:11,fontWeight:700,color:'var(--text3)',padding:'4px 0'}}>{d}</div>
        ))}
      </div>

      {/* Calendar grid */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4}}>
        {cells.map((d,i)=>{
          if(!d)return<div key={i}/>;
          const dk=dayKey(viewYear,viewMonth,d);
          const entries=weeklyPlan[dk]||[];
          const isToday=viewYear===today.getFullYear()&&viewMonth===today.getMonth()&&d===today.getDate();
          const hasA=entries.some(e=>{const t=tasks.find(x=>x.id===e.taskId);return t?.rating==='A';});
          const totalMins=entries.reduce((a,e)=>(e.startTime&&e.endTime?a+(e.endTime-e.startTime):a+30),0);
          const loadPct=Math.min(100,Math.round(totalMins/(16*60)*100));

          return(
            <div key={i}
              onClick={()=>setExpandDay(dk)}
              style={{
                background:'var(--card)',
                border:`1.5px solid ${isToday?'var(--accent)':entries.length?'var(--border)':'rgba(255,255,255,.05)'}`,
                borderRadius:8,padding:'6px',minHeight:70,cursor:'pointer',
                transition:'.15s',position:'relative',overflow:'hidden',
              }}>
              {/* Load bar at bottom */}
              {loadPct>0&&<div style={{position:'absolute',bottom:0,left:0,right:0,height:3,
                background:loadPct>85?'var(--red)':loadPct>60?'var(--orange)':'var(--green)',opacity:.5}}/>}

              {/* Day number */}
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                <span style={{
                  fontSize:14,fontWeight:isToday?900:600,
                  color:isToday?'var(--accent2)':'var(--text)',
                  background:isToday?'rgba(99,102,241,.2)':'transparent',
                  borderRadius:6,padding:isToday?'1px 6px':'0',
                }}>{d}</span>
                {hasA&&<span style={{fontSize:8,background:'rgba(220,38,38,.7)',color:'#fff',borderRadius:3,padding:'0 3px',fontWeight:700}}>A</span>}
              </div>

              {/* Mini event list */}
              {entries.slice(0,3).map((e,j)=>{
                const t=tasks.find(x=>x.id===e.taskId);
                return(
                  <div key={j} style={{fontSize:9,color:'var(--text2)',overflow:'hidden',textOverflow:'ellipsis',
                    whiteSpace:'nowrap',lineHeight:1.4,paddingRight:2}}>
                    <span style={{color:t?RC[t.rating]||'var(--text3)':'var(--text3)',fontWeight:600}}>
                      {e.time||'•'}</span> {e.name?.slice(0,12)}
                  </div>
                );
              })}
              {entries.length>3&&<div style={{fontSize:8,color:'var(--text3)'}}>+{entries.length-3} עוד</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────

const NAV=[
  {id:'dashboard',label:'מה עכשיו',icon:'🎯'},
  {id:'schedule',label:'הלוז שלי',icon:'📋'},
  {id:'pressure',label:'מצב לחץ',icon:'🚨'},
  {id:'tasks',label:'מאגר',icon:'📦'},
  {id:'weekly',label:'שבועי',icon:'📅'},
  {id:'monthly',label:'חודשי',icon:'📆'},
  {id:'summary',label:'סיכום',icon:'📈'},
];

// ── TIME THEME HELPER ────────────────────────────────────────────────
function getTimeThemeClass(){
  const h=new Date().getHours();
  if(h>=6&&h<12)return'time-morning';
  if(h>=12&&h<17)return'time-afternoon';
  if(h>=17&&h<22)return'time-evening';
  return'time-night';
}

function App(){
  const [screen,setScreenRaw]=useState('dashboard');
  const [weeklyKey,setWeeklyKey]=useState(0);
  function setScreen(s){setScreenRaw(s);if(s==='weekly')setWeeklyKey(k=>k+1);}
  const [isDarkMode,setIsDarkMode]=useState(true);
  const [autoTheme,setAutoTheme]=useState(true); // feature 11
  const [declutterMode,setDeclutterMode]=useState(false); // feature 12
  const [showDailyCard,setShowDailyCard]=useState(false); // disabled
  const [globalSearch,setGlobalSearch]=useState(false); // feature 14
  const [searchQ,setSearchQ]=useState('');
  const [dualLayout,setDualLayout]=useState(false); // feature 16
  const [showSyncPanel,setShowSyncPanel]=useState(false);
  const [syncRoom,setSyncRoom]=useState(_syncRoom);
  const [syncStatus,setSyncStatus]=useState(_syncReady?'connected':'off');
  const fileInputRef=useRef(null);

  function activateSync(room){
    if(!room.trim())return;
    const r=room.trim().toLowerCase();
    localStorage.setItem(SYNC_ROOM_KEY,r);
    _syncRoom=r;
    if(!FIREBASE_CONFIG.apiKey){setSyncStatus('no-config');return;}
    if(typeof firebase==='undefined'){setSyncStatus('sdk-missing');return;}
    if(!_firebaseDB){
      const db=initFirebase();
      if(!db){setSyncStatus('init-failed');return;}
    }
    // Push current data to Firebase FIRST (so the other device gets it)
    SYNC_KEYS.forEach(k=>{
      try{const v=JSON.parse(localStorage.getItem(k));if(v)firebaseWrite(k,v);}catch{}
    });
    // Start listeners + reload to fully activate
    startListeners();
    setSyncStatus('connected');
    setSyncRoom(r);
    // Reload to ensure all hooks pick up the new state
    setTimeout(()=>window.location.reload(),500);
  }

  function disconnectSync(){
    _syncRoom='';_syncReady=false;
    localStorage.removeItem(SYNC_ROOM_KEY);
    setSyncRoom('');setSyncStatus('off');
    window.location.reload();
  }

  // Feature 11: time-based theme
  useEffect(()=>{
    function applyTimeTheme(){
      document.body.classList.remove('time-morning','time-afternoon','time-evening','time-night');
      if(isDarkMode&&autoTheme)document.body.classList.add(getTimeThemeClass());
    }
    applyTimeTheme();
    const iv=setInterval(applyTimeTheme,60000);
    return()=>clearInterval(iv);
  },[isDarkMode,autoTheme]);

  useEffect(()=>{
    document.body.classList.toggle('light-mode',!isDarkMode);
  },[isDarkMode]);

  // Feature 12: declutter
  useEffect(()=>{
    document.body.classList.toggle('declutter-mode',declutterMode);
  },[declutterMode]);

  // Feature 14: Ctrl+K global search
  useEffect(()=>{
    function handleKey(e){
      if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();setGlobalSearch(true);setSearchQ('');}
      if(e.key==='Escape'){setGlobalSearch(false);}
    }
    window.addEventListener('keydown',handleKey);
    return()=>window.removeEventListener('keydown',handleKey);
  },[]);
  const [tasks,setTasksRaw]=usePersist('tavors_tasks',INITIAL_TASKS);
  const [schedule,setScheduleRaw]=usePersist('tavors_schedule',[]);
  const [history,setHistoryRaw]=usePersist('tavors_history',[]);
  const [weeklyPlan,setWeeklyPlanRaw]=usePersist('tavors_weekly',{});
  const [parkedItems,setParkedItemsRaw]=usePersist('tavors_parked',[]);
  const [undoStack,setUndoStack]=useState([]);
  const [undoMsg,setUndoMsg]=useState('');
  const [undoFlashTs,setUndoFlashTs]=useState(0);

  // wrap setters to save snapshot before each change
  function snapshot(){
    return{tasks,schedule,history,weeklyPlan,parkedItems};
  }
  function pushUndo(label){
    const s=snapshot();
    setUndoStack(p=>[...p.slice(-19),{...s,label}]);
    setUndoMsg(label);
    setTimeout(()=>setUndoMsg(''),3000);
  }
  function doUndo(){
    setUndoStack(p=>{
      if(!p.length)return p;
      const prev=p[p.length-1];
      setTasksRaw(prev.tasks);
      setScheduleRaw(prev.schedule);
      setHistoryRaw(prev.history);
      setWeeklyPlanRaw(prev.weeklyPlan);
      if(prev.parkedItems!==undefined)setParkedItemsRaw(prev.parkedItems);
      setUndoMsg('');
      setUndoFlashTs(Date.now());
      return p.slice(0,-1);
    });
  }

  function setTasks(v,label='עריכת משימות'){pushUndo(label);setTasksRaw(v);}
  function setSchedule(v,label='עריכת לוז'){pushUndo(label);setScheduleRaw(v);}
  function setHistory(v){setHistoryRaw(v);}
  function setWeeklyPlan(v,label='עריכת לוז שבועי'){pushUndo(label);setWeeklyPlanRaw(v);}
  function setParkedItems(v,label='עדכון חניון'){pushUndo(label);setParkedItemsRaw(v);}

  const today=new Date();
  const urgentCount=tasks.filter(t=>t.deadline&&t.deadline!=='weekly-thursday'&&daysLeft(t.deadline)<=3).length;
  const searchRef=useRef(null);

  // Feature 14: search results
  const searchResults=searchQ.trim()?tasks.filter(t=>t.name.includes(searchQ.trim())||t.domain?.includes(searchQ.trim())):[];

  // Feature 15: Export PDF
  function exportPDF(){
    window.print();
  }

  // Feature 13: daily card state
  const [dailyImportant,setDailyImportant]=useState('');
  const [dailyBlocker,setDailyBlocker]=useState('');
  const [dailyEnergy,setDailyEnergy]=useState('');

  function closeDailyCard(){
    localStorage.setItem('tavors_dailycard_date',new Date().toISOString().split('T')[0]);
    setShowDailyCard(false);
  }

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:'var(--bg)',overflow:'hidden'}}>
      <div className="app-header">
        <div>
          <div style={{fontSize:17,fontWeight:900}}>תבור 🎯</div>
          <div style={{fontSize:11,color:'var(--text3)'}}>{DAYS[today.getDay()]}, {today.getDate()} ב{MONTHS[today.getMonth()]} {today.getFullYear()}</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
          {/* Sync button */}
          <button onClick={()=>setShowSyncPanel(p=>!p)}
            style={{background:syncStatus==='connected'?'rgba(34,197,94,.15)':'transparent',
              border:`1px solid ${syncStatus==='connected'?'var(--green)':'var(--border)'}`,borderRadius:8,
              padding:'4px 9px',cursor:'pointer',fontSize:13,lineHeight:1,transition:'.2s',
              color:syncStatus==='connected'?'var(--green)':'var(--text3)',position:'relative'}}
            title={syncStatus==='connected'?`מסונכרן (${syncRoom})`:'סנכרון בין מכשירים'}>
            🔄
            {syncStatus==='connected'&&<span style={{position:'absolute',top:-2,right:-2,width:7,height:7,borderRadius:'50%',background:'var(--green)',border:'1.5px solid var(--bg)'}}/>}
          </button>
          {/* Search button */}
          <button onClick={()=>{setGlobalSearch(true);setSearchQ('');setTimeout(()=>searchRef.current?.focus(),100);}}
            style={{background:'transparent',border:'1px solid var(--border)',borderRadius:8,
              padding:'4px 9px',cursor:'pointer',fontSize:13,lineHeight:1,transition:'.2s',color:'var(--text3)',fontFamily:'inherit'}}
            title="חיפוש גלובלי (Ctrl+K)">
            🔍
          </button>
          {/* Declutter toggle */}
          <button onClick={()=>setDeclutterMode(m=>!m)}
            style={{background:declutterMode?'rgba(34,197,94,.15)':'transparent',
              border:`1px solid ${declutterMode?'var(--green)':'var(--border)'}`,borderRadius:8,
              padding:'4px 9px',cursor:'pointer',fontSize:13,lineHeight:1,transition:'.2s',
              color:declutterMode?'var(--green)':'var(--text3)'}}
            title={declutterMode?'צא ממצב ניקוי':'מצב ניקוי — הסתר כפתורים'}>
            {declutterMode?'👁️':'🧹'}
          </button>
          {/* Auto-theme toggle */}
          <button onClick={()=>setAutoTheme(m=>!m)}
            style={{background:autoTheme?'rgba(99,102,241,.15)':'transparent',
              border:`1px solid ${autoTheme?'var(--accent)':'var(--border)'}`,borderRadius:8,
              padding:'4px 9px',cursor:'pointer',fontSize:12,lineHeight:1,transition:'.2s',
              color:autoTheme?'var(--accent2)':'var(--text3)',fontFamily:'inherit',fontWeight:600}}
            title={autoTheme?'כבה ערכת נושא אוטומטית':'הפעל ערכת נושא לפי שעה'}>
            🌗
          </button>
          <button onClick={()=>setIsDarkMode(m=>!m)}
            style={{background:'transparent',border:'1px solid var(--border)',borderRadius:8,
              padding:'4px 9px',cursor:'pointer',fontSize:15,lineHeight:1,transition:'.2s'}}
            title={isDarkMode?'מצב יום':'מצב לילה'}>
            {isDarkMode?'☀️':'🌙'}
          </button>
          {/* PDF export */}
          <button onClick={exportPDF} data-declutter-hide
            style={{background:'transparent',border:'1px solid var(--border)',borderRadius:8,
              padding:'4px 9px',cursor:'pointer',fontSize:13,lineHeight:1,transition:'.2s',color:'var(--text3)'}}
            title="ייצא לוז כ-PDF">
            🖨️
          </button>
          {/* Dual layout toggle (desktop) */}
          <button onClick={()=>setDualLayout(m=>!m)} data-declutter-hide
            style={{background:dualLayout?'rgba(99,102,241,.15)':'transparent',
              border:`1px solid ${dualLayout?'var(--accent)':'var(--border)'}`,borderRadius:8,
              padding:'4px 9px',cursor:'pointer',fontSize:13,lineHeight:1,transition:'.2s',
              color:dualLayout?'var(--accent2)':'var(--text3)'}}
            title="תצוגה דו-עמודית">
            📐
          </button>
          {undoStack.length>0&&(
            <button onClick={doUndo} data-declutter-hide
              style={{display:'flex',alignItems:'center',gap:5,background:'var(--card)',border:'1px solid var(--border)',
                color:'var(--text)',borderRadius:8,padding:'5px 10px',fontSize:12,fontWeight:600,cursor:'pointer',transition:'.2s'}}
              title={`בטל: ${undoStack[undoStack.length-1]?.label}`}>
              ↩ בטל
            </button>
          )}
          {urgentCount>0&&(
            <div style={{background:'var(--red)',color:'#fff',borderRadius:20,padding:'3px 10px',fontSize:12,fontWeight:700,cursor:'pointer'}} onClick={()=>setScreen('pressure')}>
              ⚠️ {urgentCount} דחוף
            </div>
          )}
        </div>
      </div>

      {/* ═══ Sync Panel ═══ */}
      {showSyncPanel&&(
        <div className="modal-overlay" style={{zIndex:450}} onClick={()=>setShowSyncPanel(false)}>
          <div className="modal" style={{maxWidth:440}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:20,fontWeight:900,marginBottom:16,display:'flex',alignItems:'center',gap:10}}>
              🔄 סנכרון בין מכשירים
              <button onClick={()=>setShowSyncPanel(false)} style={{marginRight:'auto',background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:16}}>✕</button>
            </div>

            {/* Status */}
            <div style={{padding:'12px 16px',borderRadius:10,marginBottom:16,
              background:syncStatus==='connected'?'rgba(34,197,94,.08)':'rgba(99,102,241,.06)',
              border:`1px solid ${syncStatus==='connected'?'rgba(34,197,94,.3)':'var(--border)'}`}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{width:10,height:10,borderRadius:'50%',
                  background:syncStatus==='connected'?'var(--green)':syncStatus==='no-config'?'var(--orange)':'var(--text3)'}}/>
                <span style={{fontWeight:700,fontSize:14}}>
                  {syncStatus==='connected'?`מסונכרן — חדר "${syncRoom}"`:
                   syncStatus==='no-config'?'נדרש הגדרת Firebase':
                   syncStatus==='sdk-missing'?'Firebase SDK לא נטען — בדוק חיבור אינטרנט':
                   syncStatus==='init-failed'?'שגיאה בהתחברות ל-Firebase':'לא מחובר'}
                </span>
              </div>
              {syncStatus==='connected'&&(
                <div style={{fontSize:11,color:'var(--text2)',marginTop:6}}>
                  שינויים מסתנכרנים אוטומטית בזמן אמת בין כל המכשירים שמחוברים לאותו חדר.
                </div>
              )}
            </div>

            {/* Option A: Firebase Cloud Sync */}
            <div className="card" style={{marginBottom:12}}>
              <div style={{fontSize:14,fontWeight:800,marginBottom:8}}>☁️ סנכרון ענן (Firebase)</div>
              <div style={{fontSize:11,color:'var(--text2)',marginBottom:12,lineHeight:1.6}}>
                סנכרון אוטומטי בזמן אמת. הגדרה חד-פעמית:<br/>
                1. היכנס ל-<span style={{color:'var(--accent2)'}}>console.firebase.google.com</span><br/>
                2. צור פרויקט חדש (חינם)<br/>
                3. Realtime Database → Create → Test mode<br/>
                4. Project Settings → Web app → העתק config<br/>
                5. ערוך את הקובץ והדבק ב-FIREBASE_CONFIG
              </div>
              {FIREBASE_CONFIG.apiKey?(
                <div>
                  <div style={{fontSize:12,marginBottom:8}}>
                    <label style={{fontWeight:700}}>שם חדר סנכרון (אותו שם בשני המכשירים):</label>
                  </div>
                  <div style={{display:'flex',gap:8}}>
                    <input value={syncRoom} onChange={e=>setSyncRoom(e.target.value)}
                      placeholder="לדוגמה: tavors-room"
                      style={{fontSize:14,padding:'10px 14px'}}/>
                    {syncStatus!=='connected'?(
                      <button className="btn btn-primary" onClick={()=>activateSync(syncRoom)} disabled={!syncRoom.trim()}>
                        חבר
                      </button>
                    ):(
                      <button className="btn btn-danger" onClick={disconnectSync}>נתק</button>
                    )}
                  </div>
                </div>
              ):(
                <div style={{padding:'10px 14px',background:'rgba(249,115,22,.08)',border:'1px solid rgba(249,115,22,.3)',borderRadius:8,fontSize:12,color:'var(--orange)'}}>
                  ⚠️ טרם הוגדר Firebase — ערוך את FIREBASE_CONFIG בקובץ ה-HTML
                </div>
              )}
            </div>

            {/* Option B: Manual Export/Import */}
            <div className="card" style={{marginBottom:12}}>
              <div style={{fontSize:14,fontWeight:800,marginBottom:8}}>📦 ייצוא / ייבוא ידני</div>
              <div style={{fontSize:11,color:'var(--text2)',marginBottom:12,lineHeight:1.6}}>
                ייצא את כל הנתונים כקובץ JSON. שלח לעצמך ב-AirDrop / WhatsApp / iCloud וייבא במכשיר השני.
              </div>
              <div style={{display:'flex',gap:8}}>
                <button className="btn btn-primary btn-sm" onClick={()=>{exportAllData();}}
                  style={{flex:1}}>
                  📤 ייצוא נתונים
                </button>
                <button className="btn btn-ghost btn-sm" onClick={()=>fileInputRef.current?.click()}
                  style={{flex:1}}>
                  📥 ייבוא נתונים
                </button>
                <input ref={fileInputRef} type="file" accept=".json" style={{display:'none'}}
                  onChange={e=>{if(e.target.files[0])importAllData(e.target.files[0]);}}/>
              </div>
            </div>

            <div style={{fontSize:10,color:'var(--text3)',textAlign:'center',lineHeight:1.6}}>
              💡 ללא Firebase — השתמש בייצוא/ייבוא. עם Firebase — הכל מסתנכרן אוטומטית.
            </div>
          </div>
        </div>
      )}

      {/* ═══ Feature 13: Daily Card Popup ═══ */}
      {showDailyCard&&(
        <div className="modal-overlay" style={{zIndex:400}} onClick={closeDailyCard}>
          <div className="modal" style={{maxWidth:440,textAlign:'center'}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:40,marginBottom:8}}>🌅</div>
            <div style={{fontSize:20,fontWeight:900,marginBottom:4}}>בוקר טוב, תבור!</div>
            <div style={{fontSize:12,color:'var(--text3)',marginBottom:20}}>{DAYS[today.getDay()]}, {today.getDate()} ב{MONTHS[today.getMonth()]}</div>

            <div style={{textAlign:'right',display:'grid',gap:14}}>
              <div>
                <label style={{fontSize:13,fontWeight:700,color:'var(--accent2)'}}>🎯 מה הדבר החשוב ביותר היום?</label>
                <input value={dailyImportant} onChange={e=>setDailyImportant(e.target.value)}
                  placeholder="המשימה האחת שאם תסיים — הכל יהיה קל יותר"
                  style={{marginTop:6,fontSize:14}}/>
              </div>
              <div>
                <label style={{fontSize:13,fontWeight:700,color:'var(--orange)'}}>⚠️ מה עלול לדחות אותך היום?</label>
                <input value={dailyBlocker} onChange={e=>setDailyBlocker(e.target.value)}
                  placeholder="מה הסיכוי הכי גבוה שידרוש את היום?"
                  style={{marginTop:6,fontSize:14}}/>
              </div>
              <div>
                <label style={{fontSize:13,fontWeight:700,color:'var(--green)'}}>⚡ כמה אנרגיה יש לך עכשיו?</label>
                <div style={{display:'flex',gap:8,marginTop:8}}>
                  {[['🔥','גבוהה'],['😐','בינונית'],['😴','נמוכה']].map(([ic,lv])=>(
                    <button key={lv} onClick={()=>setDailyEnergy(lv)}
                      className={`energy-btn${dailyEnergy===lv?' selected':''}`}
                      style={{padding:'10px 8px'}}>
                      {ic} {lv}
                    </button>
                  ))}
                </div>
              </div>
            </div>

            <button className="big-cta" style={{marginTop:20}} onClick={()=>{closeDailyCard();setScreen('schedule');}}>
              בוא נתחיל! 🚀
            </button>
            <button onClick={closeDailyCard}
              style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:12,marginTop:10,fontFamily:'inherit'}}>
              דלג →
            </button>
          </div>
        </div>
      )}

      {/* ═══ Feature 14: Global Search ═══ */}
      {globalSearch&&(
        <div className="search-overlay" onClick={()=>setGlobalSearch(false)}>
          <div className="search-box" onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',alignItems:'center',gap:10,padding:'0 16px'}}>
              <span style={{fontSize:18,color:'var(--text3)'}}>🔍</span>
              <input ref={searchRef} className="search-input" value={searchQ} onChange={e=>setSearchQ(e.target.value)}
                placeholder="חיפוש משימה... (Esc לסגירה)"
                autoFocus
                onKeyDown={e=>{if(e.key==='Escape')setGlobalSearch(false);}}/>
              <span style={{fontSize:10,color:'var(--text3)',background:'var(--bg2)',padding:'2px 8px',borderRadius:5,whiteSpace:'nowrap'}}>Ctrl+K</span>
            </div>
            {searchQ.trim()&&(
              <div className="search-results">
                {searchResults.length===0&&(
                  <div style={{padding:20,textAlign:'center',color:'var(--text3)',fontSize:13}}>לא נמצאו תוצאות</div>
                )}
                {searchResults.map(t=>{
                  const dl=t.deadline&&t.deadline!=='weekly-thursday'?daysLeft(t.deadline):null;
                  const inSchedule=schedule.some(s=>s.taskId===t.id);
                  return(
                    <div key={t.id} className="search-result">
                      <span className="rating-badge" style={{background:(RC[t.rating]||'#6B7280')+'22',color:RC[t.rating]||'#6B7280',border:`1px solid ${(RC[t.rating]||'#6B7280')}66`,flexShrink:0}}>{t.rating}</span>
                      <span className="sr-name">{t.name}</span>
                      {t.domain&&<span style={{fontSize:10,color:'var(--text3)'}}>{t.domain}</span>}
                      {dl!==null&&<span style={{fontSize:10,color:dlColor(dl),fontWeight:700}}>{dl}י</span>}
                      <button className="btn btn-ghost btn-sm" style={{padding:'3px 8px',fontSize:11}}
                        onClick={()=>{
                          setGlobalSearch(false);
                          setScreen('schedule');
                          // Add to schedule
                          const st=schedule.length?Math.max(...schedule.map(i=>i.endTime)):9*60;
                          const dur=taskDur(t);
                          setSchedule(p=>[...p,{
                            id:uid(),taskId:t.id,name:t.name,
                            startTime:st,endTime:st+dur,
                            done:false,isBreak:false,isFixed:false,
                            layerNote:t.layerable?'להקביל: '+t.layerable:null,
                            task:t,note:''
                          }].sort((a,b)=>a.startTime-b.startTime));
                        }}>
                        {inSchedule?'+ עוד':'+ ללוז'}
                      </button>
                      <button className="btn btn-ghost btn-sm" style={{padding:'3px 8px',fontSize:11}}
                        onClick={()=>{setGlobalSearch(false);setScreen('tasks');}}>
                        פרטים
                      </button>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      )}

      {/* undo toast */}
      {undoMsg&&(
        <div style={{position:'fixed',bottom:70,right:'50%',transform:'translateX(50%)',
          background:'var(--card)',border:'1px solid var(--accent)',color:'var(--text)',
          borderRadius:20,padding:'8px 16px',fontSize:13,fontWeight:600,zIndex:300,
          boxShadow:'0 4px 20px rgba(0,0,0,.4)',display:'flex',alignItems:'center',gap:8,
          animation:'fadeIn .2s ease'}}>
          ↩ {undoMsg}
          <button onClick={doUndo}
            style={{background:'var(--accent)',border:'none',color:'#fff',borderRadius:12,
              padding:'2px 10px',fontSize:12,cursor:'pointer',fontWeight:700,fontFamily:'inherit'}}>
            בטל
          </button>
        </div>
      )}

      {/* ═══ Feature 16: Dual Column Layout (Desktop) ═══ */}
      {dualLayout?(
        <div className="main-content desktop-dual-col">
          <div className="dual-left"
            onDragOver={e=>{if(e.dataTransfer.types.includes('paneltaskid'))e.stopPropagation();}}
            onDrop={e=>{if(e.dataTransfer.types.includes('paneltaskid'))e.stopPropagation();}}>
            <WeeklyScheduleScreen key={weeklyKey+1000} tasks={tasks} setTasks={setTasks} weeklyPlan={weeklyPlan} setWeeklyPlan={setWeeklyPlan} history={history} setHistory={setHistory} parkedItems={parkedItems} setParkedItems={setParkedItems} undoFlashTs={undoFlashTs}/>
          </div>
          <div className="dual-right"
            onDragOver={e=>{if(e.dataTransfer.types.includes('weeklytaskid'))e.stopPropagation();}}
            onDrop={e=>{if(e.dataTransfer.types.includes('weeklytaskid'))e.stopPropagation();}}>
            {screen==='dashboard'&&<DashboardScreen tasks={tasks} setScreen={setScreen} schedule={schedule}/>}
            {screen==='schedule'&&<DailyScheduleScreen tasks={tasks} setTasks={setTasks} schedule={schedule} setSchedule={setSchedule} history={history} setHistory={setHistory} setWeeklyPlan={setWeeklyPlan} parkedItems={parkedItems} setParkedItems={setParkedItems} undoFlashTs={undoFlashTs}/>}
            {screen==='pressure'&&<PressureModeScreen tasks={tasks} setScreen={setScreen}/>}
            {screen==='tasks'&&<TaskRepositoryScreen tasks={tasks} setTasks={setTasks} history={history}/>}
            {screen==='summary'&&<WeeklySummaryScreen history={history} tasks={tasks} weeklyPlan={weeklyPlan} schedule={schedule}/>}
            {screen==='weekly'&&<WeeklyScheduleScreen key={weeklyKey} tasks={tasks} setTasks={setTasks} weeklyPlan={weeklyPlan} setWeeklyPlan={setWeeklyPlan} history={history} setHistory={setHistory} parkedItems={parkedItems} setParkedItems={setParkedItems} undoFlashTs={undoFlashTs}/>}
            {screen==='monthly'&&<MonthlyYearlyScreen tasks={tasks} setTasks={setTasks} weeklyPlan={weeklyPlan} setWeeklyPlan={setWeeklyPlan} history={history} setHistory={setHistory} parkedItems={parkedItems} setParkedItems={setParkedItems} undoFlashTs={undoFlashTs} setScreen={setScreen}/>}
          </div>
        </div>
      ):(
        <div className="main-content">
          {screen==='dashboard'&&<DashboardScreen tasks={tasks} setScreen={setScreen} schedule={schedule}/>}
          {screen==='schedule'&&<DailyScheduleScreen tasks={tasks} setTasks={setTasks} schedule={schedule} setSchedule={setSchedule} history={history} setHistory={setHistory} setWeeklyPlan={setWeeklyPlan} parkedItems={parkedItems} setParkedItems={setParkedItems} undoFlashTs={undoFlashTs}/>}
          {screen==='pressure'&&<PressureModeScreen tasks={tasks} setScreen={setScreen}/>}
          {screen==='tasks'&&<TaskRepositoryScreen tasks={tasks} setTasks={setTasks} history={history}/>}
          {screen==='summary'&&<WeeklySummaryScreen history={history} tasks={tasks} weeklyPlan={weeklyPlan} schedule={schedule}/>}
          {screen==='weekly'&&<WeeklyScheduleScreen key={weeklyKey} tasks={tasks} setTasks={setTasks} weeklyPlan={weeklyPlan} setWeeklyPlan={setWeeklyPlan} history={history} setHistory={setHistory} parkedItems={parkedItems} setParkedItems={setParkedItems} undoFlashTs={undoFlashTs}/>}
          {screen==='monthly'&&<MonthlyYearlyScreen tasks={tasks} setTasks={setTasks} weeklyPlan={weeklyPlan} setWeeklyPlan={setWeeklyPlan} history={history} setHistory={setHistory} parkedItems={parkedItems} setParkedItems={setParkedItems} undoFlashTs={undoFlashTs} setScreen={setScreen}/>}
        </div>
      )}

      <nav className="nav-bar" data-no-print>
        {NAV.map(item=>(
          <button key={item.id} className={`nav-item${screen===item.id?' active':''}`} onClick={()=>setScreen(item.id)}>
            <span style={{fontSize:18}}>{item.icon}</span>
            <span>{item.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
