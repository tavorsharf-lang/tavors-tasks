<script>
const GCAL_CLIENT_ID='413356220147-3mqct4k49a35gph7i5p4qcujke506l1u.apps.googleusercontent.com';
const GCAL_SCOPES='https://www.googleapis.com/auth/calendar.events';
let _gcalToken=null;

function gcalAuth(){
  return new Promise((resolve,reject)=>{
    if(_gcalToken){resolve(_gcalToken);return;}
    const client=google.accounts.oauth2.initTokenClient({
      client_id:GCAL_CLIENT_ID,
      scope:GCAL_SCOPES,
      callback:(resp)=>{
        if(resp.error){reject(resp);return;}
        _gcalToken=resp.access_token;
        resolve(_gcalToken);
      }
    });
    client.requestAccessToken();
  });
}

async function gcalCreateEvent(token,summary,startMin,endMin,description,location,color,reminders){
  const now=new Date();
  const y=now.getFullYear(),mo=now.getMonth(),d=now.getDate();
  const startDate=new Date(y,mo,d,Math.floor(startMin/60),startMin%60);
  const endDate=new Date(y,mo,d,Math.floor(endMin/60),endMin%60);
  const event={
    summary,
    start:{dateTime:startDate.toISOString(),timeZone:'Asia/Jerusalem'},
    end:{dateTime:endDate.toISOString(),timeZone:'Asia/Jerusalem'},
    reminders:{useDefault:false,overrides:reminders||[{method:'popup',minutes:10}]},
  };
  if(description)event.description=description;
  if(location)event.location=location;
  if(color)event.colorId=color;
  const resp=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',{
    method:'POST',
    headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
    body:JSON.stringify(event)
  });
  return resp.json();
}

// Smart reminders based on task type + manual overrides
function getSmartReminders(task,isFixed){
  const alerts=[];
  const profile=task?.alertProfile||'auto';

  // Travel → add 2 hours before
  if(task?.requiresTravel){
    alerts.push({method:'popup',minutes:120});
  }

  if(profile==='none')return alerts; // only travel if set

  if(profile==='critical'){
    alerts.push({method:'popup',minutes:1440},{method:'popup',minutes:60},{method:'popup',minutes:10});
  } else if(profile==='important'){
    alerts.push({method:'popup',minutes:60},{method:'popup',minutes:10});
  } else if(profile==='standard'){
    alerts.push({method:'popup',minutes:30},{method:'popup',minutes:10});
  } else if(profile==='light'){
    alerts.push({method:'popup',minutes:10});
  } else if(profile==='minimal'){
    alerts.push({method:'popup',minutes:5});
  } else {
    // Auto mode — decide by rating/type
    if(task&&(task.damageType==='hard-deadline'||task.rating==='A')){
      alerts.push({method:'popup',minutes:1440},{method:'popup',minutes:60},{method:'popup',minutes:10});
    } else if(isFixed){
      alerts.push({method:'popup',minutes:30},{method:'popup',minutes:10});
    } else if(task&&task.rating==='B'){
      alerts.push({method:'popup',minutes:10});
    } else {
      alerts.push({method:'popup',minutes:5});
    }
  }
  return alerts;
}

// Import events FROM Google Calendar into the app
async function gcalImportEvents(token,existingSchedule){
  const now=new Date();
  const dayStart=new Date(now.getFullYear(),now.getMonth(),now.getDate(),0,0,0).toISOString();
  const dayEnd=new Date(now.getFullYear(),now.getMonth(),now.getDate(),23,59,59).toISOString();
  const resp=await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${dayStart}&timeMax=${dayEnd}&maxResults=100&singleEvents=true&orderBy=startTime`,{
    headers:{'Authorization':'Bearer '+token}
  });
  const data=await resp.json();
  if(!data.items)return[];
  // Filter out events that were created by our app (avoid re-importing)
  const tavorsMarkers=['[A]','[B]','[C]','[D]','[E]','🧘','🍳','☕','🦵','🐕','📱','💙','🗒️','⚖️','📚','🇬🇧'];
  const external=data.items.filter(ev=>{
    if(!ev.summary)return false;
    if(ev.status==='cancelled')return false;
    // Skip events created by our app
    if(tavorsMarkers.some(m=>ev.summary.includes(m)))return false;
    return true;
  });
  // Convert to schedule format
  const imported=[];
  for(const ev of external){
    const isAllDay=!ev.start.dateTime;
    let startMin,endMin;
    if(isAllDay){
      startMin=8*60; // all-day events show at 08:00
      endMin=8*60+30;
    }else{
      const st=new Date(ev.start.dateTime);
      const en=new Date(ev.end.dateTime);
      startMin=st.getHours()*60+st.getMinutes();
      endMin=en.getHours()*60+en.getMinutes();
    }
    // Skip if already in schedule (same name + same time)
    const alreadyExists=existingSchedule.some(s=>
      s.name===ev.summary&&Math.abs(s.startTime-startMin)<5
    );
    if(alreadyExists)continue;
    imported.push({
      id:++_uid,
      taskId:null,
      name:ev.summary,
      startTime:startMin,
      endTime:endMin>startMin?endMin:startMin+30,
      done:false,isBreak:false,isFixed:true,isPinned:false,
      layerNote:null,
      task:null,
      note:[ev.location,ev.description].filter(Boolean).join(' · ').slice(0,100)||'',
      _fromGcal:true,
      _gcalId:ev.id,
    });
  }
  return imported;
}

// Delete all Tavors events from today before re-syncing
async function gcalDeleteTodayEvents(token){
  const now=new Date();
  const dayStart=new Date(now.getFullYear(),now.getMonth(),now.getDate(),0,0,0).toISOString();
  const dayEnd=new Date(now.getFullYear(),now.getMonth(),now.getDate(),23,59,59).toISOString();
  // Fetch today's events
  const resp=await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${dayStart}&timeMax=${dayEnd}&maxResults=100&singleEvents=true`,{
    headers:{'Authorization':'Bearer '+token}
  });
  const data=await resp.json();
  if(!data.items)return 0;
  // Delete only events created by our app (have [A]/[B]/[C] prefix or known names)
  const tavorsMarkers=['[A]','[B]','[C]','[D]','[E]','🧘','🍳','☕','🦵','🐕','📱','💙','🗒️','⚖️','📚','🇬🇧'];
  const toDelete=data.items.filter(ev=>tavorsMarkers.some(m=>ev.summary&&ev.summary.includes(m)));
  let deleted=0;
  for(const ev of toDelete){
    await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${ev.id}`,{
      method:'DELETE',
      headers:{'Authorization':'Bearer '+token}
    });
    deleted++;
  }
  return deleted;
}

async function gcalSyncSchedule(schedule,tasks){
  try{
    const token=await gcalAuth();
    // First: delete previous sync for today
    const deleted=await gcalDeleteTodayEvents(token);
    console.log(`🗑️ Deleted ${deleted} old events`);
    // Then: create fresh events
    let count=0;
    for(const it of schedule){
      if(it.isBreak)continue;
      const t=it.task||tasks.find(x=>x.id===it.taskId);
      const rating=t?`[${t.rating}] `:'';
      const desc=[
        t?.dominoEffect?'🎯 '+t.dominoEffect:'',
        t?.consequences?'⚠️ '+t.consequences:'',
        it.note?'📝 '+it.note:'',
        it.layerNote?'🎧 '+it.layerNote:'',
      ].filter(Boolean).join('\n');
      const loc=it.note&&it.note.includes('כיתה')?it.note:undefined;
      const color=t?.rating==='A'?'11':t?.rating==='B'?'6':undefined;
      const reminders=getSmartReminders(t,it.isFixed);
      await gcalCreateEvent(token,rating+it.name,it.startTime,it.endTime,desc||undefined,loc,color,reminders);
      count++;
    }
    return count;
  }catch(e){
    console.error('GCal sync error:',e);
    throw e;
  }
}
</script>

<script>
// Block ALL zoom gestures everywhere — no exceptions at browser level
// Our custom pinch handler on .pinch-zoom-area handles grid zoom internally via React state
document.addEventListener('touchmove',function(e){
  if(e.touches&&e.touches.length>1){e.preventDefault();}
},{passive:false});
document.addEventListener('gesturestart',function(e){e.preventDefault();},{passive:false});
document.addEventListener('gesturechange',function(e){e.preventDefault();},{passive:false});
document.addEventListener('gestureend',function(e){e.preventDefault();},{passive:false});
// Block double-tap zoom
var lastTap=0;
document.addEventListener('touchend',function(e){
  var now=Date.now();
  if(now-lastTap<300){e.preventDefault();}
  lastTap=now;
},{passive:false});
</script>

const SYNC_ROOM_KEY = 'tavors_sync_room';
const SYNC_KEYS = ['tavors_tasks','tavors_schedule','tavors_history','tavors_weekly','tavors_parked'];
let _firebaseDB = null;
let _syncRoom = localStorage.getItem(SYNC_ROOM_KEY) || '';
let _syncReady = false;
// Track last write timestamps to ignore own writes bouncing back
const _lastWriteTs = {};

function initFirebase(){
  if(_firebaseDB)return _firebaseDB;
  if(!FIREBASE_CONFIG.apiKey||typeof firebase==='undefined')return null;
  try{
    try{firebase.app();}catch(e){firebase.initializeApp(FIREBASE_CONFIG);}
    _firebaseDB=firebase.database();
    console.log('🔥 Firebase DB ready');
    return _firebaseDB;
  }catch(e){console.warn('Firebase init failed:',e);return null;}
}

function firebaseWrite(key,value){
  if(!_firebaseDB||!_syncRoom)return;
  const payload={data:JSON.stringify(value),ts:Date.now(),device:_deviceId};
  _lastWriteTs[key]=payload.ts;
  _firebaseDB.ref(`rooms/${_syncRoom}/${key}`).set(payload).catch(e=>console.warn('write err:',e));
}

// Unique device ID to distinguish own writes
const _deviceId=localStorage.getItem('tavors_device_id')||(()=>{const id=Math.random().toString(36).slice(2,10);localStorage.setItem('tavors_device_id',id);return id;})();

// Global registry: usePersist hooks register here so we can push updates to them
const _syncCallbacks = {}; // key → setter function

function startListeners(){
  if(!_firebaseDB||!_syncRoom)return;
  SYNC_KEYS.forEach(key=>{
    const ref=_firebaseDB.ref(`rooms/${_syncRoom}/${key}`);
    ref.on('value',snap=>{
      if(!snap.exists())return;
      try{
        const payload=snap.val();
        const val=JSON.parse(payload.data);
        // Ignore our own writes
        if(payload.device===_deviceId)return;
        // Update localStorage + React state
        localStorage.setItem(key,JSON.stringify(val));
        if(_syncCallbacks[key])_syncCallbacks[key](val);
        console.log('📥 synced:',key);
      }catch(e){console.warn('listen parse err:',e);}
    });
  });
  _syncReady=true;
  console.log('👂 listeners active for room:',_syncRoom);
}

// ── PERSISTENCE HOOK (localStorage + Firebase) ──────────────────────
function usePersist(key,init){
  const [val,setVal]=useState(()=>{
    try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}
    catch{return init;}
  });

  // Register this hook's setter so Firebase listener can push updates
  useEffect(()=>{
    _syncCallbacks[key]=(remoteVal)=>{
      setVal(remoteVal);
    };
    return()=>{delete _syncCallbacks[key];};
  },[key]);

  const setter=useCallback(v=>{
    setVal(prev=>{
      const next=typeof v==='function'?v(prev):v;
      try{localStorage.setItem(key,JSON.stringify(next));}catch{}
      // Push to Firebase
      if(_syncReady&&_syncRoom){
        firebaseWrite(key,next);
      }
      return next;
    });
  },[key]);
  return [val,setter];
}

// ── EXPORT / IMPORT (works without Firebase) ─────────────────────────
function exportAllData(){
  const data={};
  ['tavors_tasks','tavors_schedule','tavors_history','tavors_weekly','tavors_parked'].forEach(k=>{
    try{data[k]=JSON.parse(localStorage.getItem(k));}catch{}
  });
  data._exportDate=new Date().toISOString();
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`tavors-backup-${new Date().toISOString().split('T')[0]}.json`;
  a.click();URL.revokeObjectURL(url);
}

function importAllData(file,reloadFn){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      ['tavors_tasks','tavors_schedule','tavors_history','tavors_weekly','tavors_parked'].forEach(k=>{
        if(data[k]!==undefined)localStorage.setItem(k,JSON.stringify(data[k]));
      });
      if(reloadFn)reloadFn();
      else window.location.reload();
    }catch(err){alert('שגיאה בייבוא: '+err.message);}
  };
  reader.readAsText(file);
}

function fmtDuration(mins){

  const h=Math.floor(mins/60),m=mins%60;
  if(m===0)return h===1?'שעה':`${h} שעות`;
  if(h===1&&m===30)return'שעה וחצי';
  if(h===1)return`שעה ו-${m} דקות`;

}

function getGrowthTaskForDate(dateKey){
  // Rotate: each day gets a different growth task

function fmtMin(m){

}
function parseMin(s){
  const [h,m]=s.split(':').map(Number);
  return h*60+m;
}
function todayKey(){return new Date().toISOString().split('T')[0]}
function lastDoneInfo(history,taskId,taskName){
  // Find last time this task was completed — by taskId or by name
  const entries=history.filter(h=>h.action==='done'&&(h.taskId===taskId||(taskName&&h.name&&h.name.includes(taskName))));
  if(!entries.length)return null;
  const last=entries.sort((a,b)=>b.date.localeCompare(a.date))[0];
  const days=Math.floor((new Date()-new Date(last.date))/(1000*60*60*24));
  return{days,date:last.date};
}
function LastDoneBadge({history,taskId,taskName}){

  const{days}=info;
  const color=days===0?'var(--green)':days<=2?'var(--accent2)':days<=7?'var(--orange)':'var(--red)';
  const label=days===0?'היום':days===1?'אתמול':`לפני ${days} ימים`;
  return React.createElement('span',{style:{fontSize:9,color,fontWeight:600}},`✓ ${label}`);
}
function taskDur(t){
  if(!t)return 15;
  if(t.fixedTime==='17:00')return 15;
  if(t.fixedTime==='18:00')return 10;
  if(t.fixedTime==='23:00')return 15;
  if(t.isMorningRitual)return 5;
  if(t.isPhysio)return 10;
  if(t.isDogWalk)return 45;
  if(t.energyRequired==='גבוהה')return 90;
  if(t.energyRequired==='בינונית')return 60;
  return 30;
}

// ── SCHEDULE BUILDER ─────────────────────────────────────────────────

function buildSchedule(tasks,wakeMin,mainTaskId,breakDur,dow,isToday){
  const items=[];
  // Today: start from current time (if after 6am), otherwise 08:00
  let cur;
  if(isToday){
    const nowH=new Date().getHours(),nowM=new Date().getMinutes();
    cur=(nowH>=6)?(nowH*60+nowM):8*60;
  }else{
    cur=8*60;
  }

  function push(t,dur,label,isBreak,layerNote){
    items.push({
      id:uid(),taskId:t?t.id:null,
      name:label||(t?t.name:''),
      startTime:cur,endTime:cur+dur,
      done:false,isBreak:!!isBreak,isFixed:false,layerNote:layerNote||null,task:t||null
    });
    cur+=dur;
  }

  // ── FIXED DAILY TASKS ONLY ──

  // Morning: breakfast first, then mindfulness
  push(null,55,'🍳 ארוחת בוקר + צחצוח שיניים + סידור חדר בסיסי + כביסה',false,null);
  push(null,5,'🧘 מיינדפולנס בוקר',false,null);

  // Physio session (morning)
  const physio=tasks.find(t=>t.isPhysio);
  if(physio){
    push(physio,10,'פיזיותרפיה (סשן ראשון)',false,'להקביל: האזנה להקלטות');
  }

  // Main chosen task (if user selected one)
  const main=tasks.find(t=>t.id===mainTaskId);
  if(main&&!main.fixedTime){
    push(main,taskDur(main),null,false,main.layerable?'להקביל: '+main.layerable:null);
    push(null,breakDur,'הפסקה ('+breakDur+' דקות)',true,null);
  }

  // Second physio
  if(physio){
    items.push({id:uid(),taskId:physio.id,name:'פיזיותרפיה (סשן שני)',startTime:15*60,endTime:15*60+10,done:false,isBreak:false,isFixed:false,layerNote:'להקביל',task:physio});
  }

  // Daily growth task (rotates one from pool)
  const todayGrowth=getGrowthTaskForDate(new Date().toISOString().split('T')[0]);
  if(todayGrowth){
    push(null,todayGrowth.duration,'🌱 '+todayGrowth.name,false,null);
  }

  // Dog walk — afternoon
  const dog=tasks.find(t=>t.isDogWalk);
  if(dog){
    push(dog,45,null,false,'להקביל: פודקאסטים, הקלטות שיעורים');
  }

  // Thursday injection
  if(dow===4){
    const inj=tasks.find(t=>t.isThursdayOnly);
    if(inj) items.push({id:uid(),taskId:inj.id,name:inj.name,startTime:10*60,endTime:10*60+10,done:false,isBreak:false,isFixed:true,layerNote:null,task:inj});
  }

  // Fixed time tasks
  [{time:'17:00',id:10},{time:'18:00',id:22},{time:'23:00',id:23}].forEach(({time,id})=>{
    const t=tasks.find(x=>x.id===id);
    if(t){
      const tm=parseMin(time);
      items.push({id:uid(),taskId:t.id,name:t.name,startTime:tm,endTime:tm+taskDur(t),done:false,isBreak:false,isFixed:true,layerNote:null,task:t});
    }
  });

  // Sort
  items.sort((a,b)=>a.startTime-b.startTime);

  // Fix overlaps for non-fixed
  let prev=items[0]?.startTime||wakeMin;
  for(const it of items){
    if(!it.isFixed&&it.startTime<prev){
      const dur=it.endTime-it.startTime;
      it.startTime=prev;it.endTime=prev+dur;
    }
    prev=it.endTime;
  }

  return items;
}

function computeOverlapLayout(items){
  if(!items.length)return{};
  const sorted=[...items].sort((a,b)=>a.startTime-b.startTime);
  const cols=[];
  const assigned={};
  for(const item of sorted){
    let c=0;
    while(c<cols.length&&cols[c]>item.startTime)c++;
    cols[c]=item.endTime;
    assigned[item.id]=c;
  }
  const result={};
  for(const item of sorted){
    const concurrent=sorted.filter(o=>o.id!==item.id&&o.startTime<item.endTime&&o.endTime>item.startTime);
    if(!concurrent.length){result[item.id]={col:0,totalCols:1};}
    else{
      const allInGroup=[item,...concurrent];
      const maxCol=Math.max(...allInGroup.map(o=>assigned[o.id]));
      result[item.id]={col:assigned[item.id],totalCols:maxCol+1};
    }
  }
  return result;
}

function DailyScheduleScreen({tasks,setTasks,schedule,setSchedule,history,setHistory,setWeeklyPlan,parkedItems,setParkedItems,undoFlashTs,isToday:_isToday}){
  const isToday=_isToday!==undefined?_isToday:true; // default to true for main schedule

  function nowIsrael(){

  }
  const [wakeTime,setWakeTime]=useState(nowIsrael);
  const [mainId,setMainId]=useState(null);
  const [breakDur,setBreakDur]=useState(15);
  const [energy,setEnergy]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [postponeOpen,setPostponeOpen]=useState(null);
  const [copyMsg,setCopyMsg]=useState('');
  const [editItem,setEditItem]=useState(null);
  const dragIdx=useRef(null);
  const [dragOver,setDragOver]=useState(null);
  // Grid drag state
  const [magnetMode,setMagnetMode]=useState(true);
  const [bufferMin,setBufferMin]=useState(5);
  const [xrayMode,setXrayMode]=useState(false);
  const [quickAdd,setQuickAdd]=useState('');
  const [draggingId,setDraggingId]=useState(null);
  const [liveSchedule,setLiveSchedule]=useState(null);
  const gridDrag=useRef(null);
  const pendingRef=useRef(null);
  const setScheduleRef=useRef(setSchedule);
  useEffect(()=>{setScheduleRef.current=setSchedule;},[setSchedule]);
  // Side panel (split view)
  const [showSidePanel,setShowSidePanel]=useState(false);
  const [sidePanelTab,setSidePanelTab]=useState('tasks'); // 'tasks' or 'growth'
  const [externalDragOver,setExternalDragOver]=useState(false);
  const [dropPreviewMin,setDropPreviewMin]=useState(null);
  const [panelSearch,setPanelSearch]=useState('');
  const [panelRating,setPanelRating]=useState('');
  const gridRef=useRef(null);
  // Snap guide + pulse
  const [snapGuideMin,setSnapGuideMin]=useState(null);
  const [snapPulseId,setSnapPulseId]=useState(null);
  const prevSnapMinRef=useRef(null);
  // Hover tooltip
  const [hoverInfo,setHoverInfo]=useState(null); // {item,x,y}
  // Undo flash
  const [undoFlash,setUndoFlash]=useState(false);
  useEffect(()=>{
    if(!undoFlashTs)return;
    setUndoFlash(true);
    const t=setTimeout(()=>setUndoFlash(false),700);
    return()=>clearTimeout(t);
  },[undoFlashTs]);
  const [dragOverPinned,setDragOverPinned]=useState(false);
  const dragOverPinnedRef=useRef(false); // ref version for use inside useEffect closure
  const [dragOverGreen,setDragOverGreen]=useState(false);
  const [shakingId,setShakingId]=useState(null);
  // Templates
  const [showTemplates,setShowTemplates]=useState(false);
  // Split task
  const [splitMenu,setSplitMenu]=useState(null); // {id, x, y}
  // Dependencies
  const [showDepPicker,setShowDepPicker]=useState(null); // schedule item id
  // Mobile long-press drag
  const longPressTimer=useRef(null);
  const longPressReady=useRef(false);
  // Google Calendar sync
  const [gcalSyncing,setGcalSyncing]=useState(false);
  const [gcalMsg,setGcalMsg]=useState('');
  // Filter: show only user-added tasks (not fixed daily)
  const [showOnlyMine,setShowOnlyMine]=useState(false);
  // Pinch-to-zoom for schedule grid
  const [zoomLevel,setZoomLevel]=useState(PX_DEFAULT);
  const pinchRef=useRef(null); // {startDist, startZoom}
  PX=zoomLevel; // keep global PX in sync

  function playSound(type){
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      const t=ctx.currentTime;
      if(type==='drag'){o.type='sine';o.frequency.value=280;g.gain.setValueAtTime(.06,t);g.gain.exponentialRampToValueAtTime(.001,t+.09);}
      else if(type==='drop'){o.type='sine';o.frequency.setValueAtTime(440,t);o.frequency.linearRampToValueAtTime(560,t+.12);g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.16);}
      else if(type==='done'){o.type='sine';o.frequency.setValueAtTime(660,t);o.frequency.setValueAtTime(880,t+.1);g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.28);}
      else if(type==='forbidden'){o.type='sawtooth';o.frequency.value=200;g.gain.setValueAtTime(.04,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);}
      o.start(t);o.stop(t+.35);
    }catch(e){}
  }

  function applyShift(items,buf,draggedId){
    if(!items.length)return items;
    const sorted=[...items].sort((a,b)=>a.startTime-b.startTime);
    const out=[sorted[0]];
    let stopShift=false;
    for(let i=1;i<sorted.length;i++){
      const prev=out[out.length-1];
      const cur=sorted[i];
      // Pinned items are anchors — never moved by domino shift
      if(cur.isPinned){out.push(cur);stopShift=false;continue;}
      if(stopShift){out.push(cur);continue;}
      // Don't push items away from the dragged item — allow overlap
      if(draggedId&&(cur.id===draggedId||prev.id===draggedId)){out.push(cur);continue;}
      const minStart=prev.endTime+buf;
      if(cur.startTime<minStart){
        const dur=cur.endTime-cur.startTime;
        const wouldEnd=minStart+dur;
        // Would pushing this task cause it to overlap the next pinned/fixed anchor?
        const nextAnchor=sorted.slice(i+1).find(x=>x.isPinned);
        if(nextAnchor&&wouldEnd>nextAnchor.startTime){
          stopShift=true;// can't push — stop cascading here
          out.push(cur);
        }else{
          out.push({...cur,startTime:minStart,endTime:minStart+dur});
        }
      }else{out.push(cur);}
    }
    return out;
  }

  function startGridDrag(e,item,type){
    if(type==='move'&&item.isPinned)return;
    // On touch: only allow drag after long-press confirmed
    if(e.touches&&!longPressReady.current)return;
    e.preventDefault();e.stopPropagation();
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    gridDrag.current={type,id:item.id,startY:clientY,origStart:item.startTime,origDur:item.endTime-item.startTime,origSchedule:schedule,snapMagnet:magnetMode,snapBuffer:bufferMin};
    setDraggingId(item.id);
    setLiveSchedule(schedule);
    pendingRef.current=schedule;
    prevSnapMinRef.current=item.startTime;
    playSound('drag');
  }

  useEffect(()=>{
    function onMove(e){
      if(!gridDrag.current)return;
      if(e.touches)e.preventDefault(); // prevent scroll while dragging on mobile
      const{type,id,startY,origStart,origDur,origSchedule}=gridDrag.current;
      const clientY=e.touches?e.touches[0].clientY:e.clientY;
      const dy=clientY-startY;
      const dmin=Math.round(dy/PX/15)*15;
      const ns=Math.max(0,origStart+dmin);
      // Snap guide + pulse
      if(type==='move'){
        setSnapGuideMin(ns);
        if(ns!==prevSnapMinRef.current){
          prevSnapMinRef.current=ns;
          setSnapPulseId(id);
          setTimeout(()=>setSnapPulseId(p=>p===id?null:p),280);
        }
      }
      const updated=origSchedule.map(it=>{
        if(it.id!==id)return it;
        if(type==='move')return{...it,startTime:ns,endTime:ns+origDur};
        else{const nd=Math.max(5,origDur+dmin);return{...it,endTime:it.startTime+nd};}
      });
      pendingRef.current=updated;
      setLiveSchedule(updated);
      // Forbidden zone: dragged item would overlap a pinned/fixed item
      if(type==='move'){
        const blocked=origSchedule.some(it=>it.isPinned&&it.id!==id&&ns<it.endTime&&ns+origDur>it.startTime);
        dragOverPinnedRef.current=blocked;
        setDragOverPinned(blocked);
        // Recommended zone: morning (7-12) + dev-category task
        const dragged=origSchedule.find(it=>it.id===id);
        const isDev=dragged&&taskCategory(dragged.name)==='dev';
        setDragOverGreen(!blocked&&isDev&&ns>=7*60&&ns<12*60);
      }
    }
    function onUp(){
      if(!gridDrag.current)return;
      const{snapMagnet,snapBuffer,type,id:draggedId}=gridDrag.current; // capture id before null
      const wasPinned=dragOverPinnedRef.current; // use ref, not stale closure state
      gridDrag.current=null;
      dragOverPinnedRef.current=false;
      setDraggingId(null);
      setDragOverPinned(false);
      setDragOverGreen(false);
      setSnapGuideMin(null);
      prevSnapMinRef.current=null;
      const finalRaw=pendingRef.current||schedule;
      if(wasPinned){
        // Forbidden drop: revert, shake the blocking pinned item, play error
        const blockedIt=finalRaw.find(it=>it.isPinned&&it.id!==draggedId);
        if(blockedIt){setShakingId(blockedIt.id);setTimeout(()=>setShakingId(null),500);}
        playSound('forbidden');
        setLiveSchedule(null);
        pendingRef.current=null;
        return;
      }
      // Apply shift for both move and resize — pass draggedId to allow overlap
      const final=snapMagnet?applyShift(finalRaw,snapBuffer,draggedId):finalRaw;
      setScheduleRef.current(final);
      setLiveSchedule(null);
      pendingRef.current=null;
      playSound('drop');
    }
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
    window.addEventListener('touchmove',onMove,{passive:false});
    window.addEventListener('touchend',onUp);
    window.addEventListener('touchcancel',onUp);
    return()=>{
      window.removeEventListener('mousemove',onMove);
      window.removeEventListener('mouseup',onUp);
      window.removeEventListener('touchmove',onMove);
      window.removeEventListener('touchend',onUp);
      window.removeEventListener('touchcancel',onUp);
    };
  },[]);

  function handleDragStart(idx){dragIdx.current=idx;}
  function handleDragOver(e,idx){e.preventDefault();setDragOver(idx);}
  function handleDrop(e,idx){
    e.preventDefault();
    const from=dragIdx.current;
    if(from===null||from===idx){dragIdx.current=null;setDragOver(null);return;}
    setSchedule(prev=>{
      const arr=[...prev];
      const [moved]=arr.splice(from,1);
      arr.splice(idx,0,moved);

      // Recalculate times sequentially, preserving each item's duration.
      // Fixed-time items act as anchors: if cur runs into one, jump past it.
      // If cur is already past a fixed item's start, the fixed item keeps its time
      // and cur advances to its end.
      let cur=arr[0].isFixed ? arr[0].endTime : arr[0].startTime;
      return arr.map((it,i)=>{
        if(it.isFixed){
          // Fixed item: keep its time, advance cur to its end (or stay if cur already past)
          cur=Math.max(cur, it.endTime);
          return it;
        }
        const dur=it.endTime-it.startTime;
        // If a fixed item comes up next, don't overlap it
        const nextFixed=arr.slice(i+1).find(x=>x.isFixed);
        const startAt=cur;
        const result={...it, startTime:startAt, endTime:startAt+dur};
        cur=startAt+dur;
        // If we've gone past a fixed item's start, jump to after it
        if(nextFixed&&cur>nextFixed.startTime){
          // don't push into fixed item — that's handled when we hit it in order
        }
        return result;
      });

  const dayStartBuild=schedule.length?Math.min(...schedule.map(i=>i.startTime)):7*60;

  // ── Split task into parts ──
  function splitTask(itemId,parts){
    const item=schedule.find(i=>i.id===itemId);
    if(!item)return;
    const totalDur=item.endTime-item.startTime;
    const partDur=Math.max(15,Math.round(totalDur/parts/15)*15||60);
    // Find available slots spread through the day
    const allOccupied=schedule.filter(i=>i.id!==itemId).map(i=>({s:i.startTime,e:i.endTime}));
    const slots=[];
    // Divide day into zones
    const zoneSize=Math.floor((22*60-dayStartBuild)/(parts+1));
    for(let p=0;p<parts;p++){
      const zoneStart=dayStartBuild+zoneSize*(p)+60; // offset a bit
      let best=zoneStart;
      // Find gap near zone
      for(let t=zoneStart;t<zoneStart+zoneSize;t+=15){
        const conflict=allOccupied.some(o=>t<o.e&&t+partDur>o.s);
        if(!conflict){best=t;break;}
      }
      slots.push(best);
      allOccupied.push({s:best,e:best+partDur});
    }
    // Replace original with split items
    const newItems=slots.map((st,i)=>({
      id:uid(),taskId:item.taskId,name:`${item.name} (${i+1}/${parts})`,
      startTime:st,endTime:st+partDur,
      done:false,isBreak:false,isFixed:false,
      layerNote:item.layerNote,task:item.task,note:item.note||'',
      splitGroup:itemId, // link back
      dependsOn:item.dependsOn||null,
    }));
    setSchedule(p=>[...p.filter(i=>i.id!==itemId),...newItems].sort((a,b)=>a.startTime-b.startTime));
    setSplitMenu(null);
    playSound('drop');
  }

  // ── Export to Apple Calendar (.ics) ──
  function exportICS(){
    const now=new Date();
    const y=now.getFullYear(),mo=now.getMonth(),d=now.getDate();
    function pad(n){return String(n).padStart(2,'0');}
    function toICSDate(mins){
      const h=Math.floor(mins/60),m=mins%60;
      // Create date in local time, convert to UTC for ICS
      const dt=new Date(y,mo,d,h,m,0);
      return dt.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');
    }
    const events=schedule.filter(it=>!it.isBreak).map(it=>{
      const desc=it.note?it.note.replace(/\n/g,'\\n'):'';
      const rating=it.task?`[${it.task.rating}] `:'';
      return[
        'BEGIN:VEVENT',
        `DTSTART:${toICSDate(it.startTime)}`,
        `DTEND:${toICSDate(it.endTime)}`,
        `SUMMARY:${rating}${it.name}`,
        desc?`DESCRIPTION:${desc}`:'',
        it.note&&it.note.includes('כיתה')?`LOCATION:${it.note}`:'',
        `UID:${it.id}-${y}${pad(mo+1)}${pad(d)}@tavors`,
        // Smart alarms — uses same logic as Google Calendar
        ...(()=>{
          const reminders=getSmartReminders(t,it.isFixed);
          return reminders.map(r=>{
            const mins=r.minutes;
            const trigger=mins>=1440?`-P${Math.floor(mins/1440)}D`:mins>=60?`-PT${Math.floor(mins/60)}H`:`-PT${mins}M`;
            const label=mins>=1440?`מחר`:mins>=120?`בעוד ${Math.floor(mins/60)} שעות`:mins>=60?`בעוד שעה`:`בעוד ${mins} דקות`;
            return['BEGIN:VALARM',`TRIGGER:${trigger}`,'ACTION:DISPLAY',`DESCRIPTION:${label}: ${it.name}`,'END:VALARM'];
          }).flat();
        })(),
        'END:VEVENT'
      ].filter(Boolean).join('\r\n');
    });
    const ics=[
      'BEGIN:VCALENDAR',
      'VERSION:2.0',
      'PRODID:-//Tavors Tasks//HE',
      'CALSCALE:GREGORIAN',
      'METHOD:PUBLISH',
      `X-WR-CALNAME:הלוז של תבור — ${dateStr}`,
      ...events,
      'END:VCALENDAR'
    ].join('\r\n');
    const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`tavors-${y}-${pad(mo+1)}-${pad(d)}.ics`;
    a.click();
    URL.revokeObjectURL(url);
  }

                setShowTemplates(false);
                playSound('drop');
              }}
                style={{flex:1,minWidth:140,padding:'12px',borderRadius:10,
                  background:'var(--bg2)',border:'1px solid var(--border)',
                  cursor:'pointer',fontFamily:'inherit',textAlign:'right',transition:'.2s',color:'var(--text)'}}>
                <div style={{fontSize:15,fontWeight:800,marginBottom:4}}>{tpl.name}</div>
                <div style={{fontSize:11,color:'var(--text2)',lineHeight:1.5}}>{tpl.desc}</div>
              </button>
            ))}
          </div>
        </div>
      )}

      {/* ── Controls ── */}
      <div data-declutter-hide style={{display:'flex',gap:5,marginBottom:8,flexWrap:'wrap',alignItems:'center'}}>
        <div style={{display:'flex',alignItems:'center',gap:2,border:'1px solid var(--border)',borderRadius:7,padding:'2px 4px'}}>
          <button onClick={()=>setZoomLevel(z=>Math.max(1.2,Math.round((z-0.3)*10)/10))}
            style={{background:'none',border:'none',color:'var(--text2)',cursor:'pointer',fontSize:13,fontFamily:'inherit',padding:'2px 5px',fontWeight:700}}>−</button>
          <span style={{fontSize:10,color:'var(--text3)',minWidth:28,textAlign:'center'}}>{zoomLevel}x</span>
          <button onClick={()=>setZoomLevel(z=>Math.min(6,Math.round((z+0.3)*10)/10))}
            style={{background:'none',border:'none',color:'var(--text2)',cursor:'pointer',fontSize:13,fontFamily:'inherit',padding:'2px 5px',fontWeight:700}}>+</button>
        </div>
        <button onClick={()=>setMagnetMode(m=>!m)}
          style={{display:'flex',alignItems:'center',gap:4,padding:'4px 9px',borderRadius:7,
            border:`1px solid ${magnetMode?'var(--accent)':'var(--border)'}`,
            background:magnetMode?'rgba(99,102,241,.15)':'transparent',
            color:magnetMode?'var(--accent2)':'var(--text2)',cursor:'pointer',fontSize:11,fontWeight:600,fontFamily:'inherit'}}>
          🧲 מגנט {magnetMode?'✓':'✗'}
        </button>
        <button onClick={()=>setShowOnlyMine(m=>!m)}
          style={{display:'flex',alignItems:'center',gap:4,padding:'4px 9px',borderRadius:7,
            border:`1px solid ${showOnlyMine?'var(--orange)':'var(--border)'}`,
            background:showOnlyMine?'rgba(249,115,22,.15)':'transparent',
            color:showOnlyMine?'var(--orange)':'var(--text2)',cursor:'pointer',fontSize:11,fontWeight:600,fontFamily:'inherit'}}>
          {showOnlyMine?'👤 שלי בלבד':'👁️ הכל'}
        </button>
        <button onClick={()=>{
            if(!window.confirm('למחוק את כל המשימות שהוספת ידנית? (קבועות יישארו)'))return;
            setSchedule(p=>p.filter(i=>FIXED_DAILY_NAMES.some(n=>i.name.includes(n))||i.isBreak));
          }}
          style={{padding:'4px 9px',borderRadius:7,fontSize:11,fontWeight:600,fontFamily:'inherit',cursor:'pointer',
            border:'1px solid rgba(239,68,68,.35)',background:'rgba(239,68,68,.07)',color:'#EF4444'}}>
          🗑️ נקה ידניות
        </button>
        <span style={{fontSize:10,color:'var(--text3)'}}>זמן נשימה:</span>
        {[0,5,10].map(b=>(
          <button key={b} onClick={()=>setBufferMin(b)}
            style={{padding:'3px 7px',borderRadius:6,fontSize:11,
              border:`1px solid ${bufferMin===b?'var(--accent)':'var(--border)'}`,
              background:bufferMin===b?'rgba(99,102,241,.15)':'transparent',
              color:bufferMin===b?'var(--accent2)':'var(--text3)',cursor:'pointer',fontFamily:'inherit',fontWeight:600}}>
            {b===0?'ללא':b+'′'}
          </button>
        ))}
        <button onClick={()=>setXrayMode(m=>!m)}
          style={{padding:'4px 9px',borderRadius:7,fontSize:11,fontWeight:600,fontFamily:'inherit',cursor:'pointer',
            border:`1px solid ${xrayMode?'#2563EB':'var(--border)'}`,
            background:xrayMode?'rgba(37,99,235,.15)':'transparent',
            color:xrayMode?'#2563EB':'var(--text3)'}}>
          🔬 X-Ray
        </button>
        <button onClick={()=>setShowSidePanel(m=>!m)}
          title="פתח מאגר משימות לצד הלוז — גרור משימה ישירות לשעה"
          style={{padding:'4px 9px',borderRadius:7,fontSize:11,fontWeight:600,fontFamily:'inherit',cursor:'pointer',
            border:`1px solid ${showSidePanel?'var(--green)':'var(--border)'}`,
            background:showSidePanel?'rgba(34,197,94,.15)':'transparent',
            color:showSidePanel?'var(--green)':'var(--text3)'}}>
          📦 {showSidePanel?'סגור מאגר':'פתח מאגר'}
        </button>
        {[15,30].map(delay=>(
          <button key={delay}
            onClick={()=>{
              setSchedule(prev=>prev.map(it=>(!it.isPinned&&it.startTime>nowMinG)?{...it,startTime:it.startTime+delay,endTime:it.endTime+delay}:it));
            }}
            style={{padding:'4px 9px',borderRadius:7,fontSize:11,fontWeight:600,fontFamily:'inherit',cursor:'pointer',
              border:'1px solid rgba(239,68,68,.35)',background:'rgba(239,68,68,.07)',color:'#EF4444'}}>
            ⏩ {delay}′
          </button>
        ))}
      </div>

      {/* ── Quick add ── */}
      <div data-declutter-hide style={{display:'flex',gap:6,marginBottom:8}}>
        <input value={quickAdd} onChange={e=>setQuickAdd(e.target.value)}
          onKeyDown={e=>{
            if(e.key!=='Enter'||!quickAdd.trim())return;
            const tm=quickAdd.match(/(\d{1,2}):(\d{2})/);
            const stm=tm?parseInt(tm[1])*60+parseInt(tm[2]):(ds.length?ds[ds.length-1].endTime:9*60);
            let dur=30;
            if(quickAdd.includes('שעה וחצי'))dur=90;
            else if(quickAdd.includes('שעתיים'))dur=120;
            else if(quickAdd.includes('שעה'))dur=60;
            else{const dm=quickAdd.match(/(\d+)\s*דקות?/);if(dm)dur=parseInt(dm[1]);}
            const nm=quickAdd.replace(/\d{1,2}:\d{2}/,'').replace(/\d+\s*דקות?/g,'').replace(/שעה[^ ]*/g,'').replace(/שעתיים/g,'').trim()||quickAdd;
            setSchedule(p=>[...p,{id:uid(),taskId:null,name:nm,startTime:stm,endTime:stm+dur,done:false,isBreak:false,isFixed:false,layerNote:null,task:null,note:''}].sort((a,b)=>a.startTime-b.startTime));
            setQuickAdd('');
          }}
          placeholder="⚡ הוסף מהיר: '10:00 שעה ריאיון' ← Enter"
          style={{fontSize:12,padding:'6px 10px'}}/>
      </div>

      </div>{/* ═══ END STICKY TOP BAR ═══ */}

      {/* ═══ SCROLLABLE CONTENT ═══ */}
      <div style={{flex:1,minHeight:0,overflowY:'auto',overflowX:'hidden',WebkitOverflowScrolling:'touch'}}>

      {/* ── Balance gauge ── */}
      {balTotal>0&&(
        <div style={{marginBottom:8,padding:'6px 10px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:8}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--text2)',marginBottom:4}}>
            <span>📚 התפתחות: {fmtDuration(devMins)}</span>
            <span style={{color:devPct>80?'var(--orange)':'var(--text3)',fontWeight:devPct>80?700:400}}>
              {devPct>80?`⚠️ ${devPct}% — שקול פנאי`:`${devPct}%`}
            </span>
            <span>🏖️ פנאי: {fmtDuration(leiMins)}</span>
          </div>
          <div style={{height:5,borderRadius:3,background:'var(--border)',overflow:'hidden',display:'flex'}}>
            <div style={{width:devPct+'%',background:'#2563EB',transition:'width .3s'}}/>
            <div style={{flex:1,background:'#22C55E'}}/>
          </div>
        </div>
      )}

      {/* ── Split View: Time Grid + optional Task Panel ── */}
      <div style={{display:'flex',direction:'ltr',gap:10,alignItems:'flex-start',marginBottom:10}}>

      {/* Time Grid column */}
      <div style={{flex:1,minWidth:0,direction:'rtl'}}>
      <div style={{display:'flex',gap:0,userSelect:'none'}}>
        {/* Hour labels */}
        <div style={{width:40,position:'relative',height:containerH,flexShrink:0}}>
          {hourLabels.map(t=>(
            <div key={t} style={{position:'absolute',top:(t-dayStart)*PX-7,right:0,width:36,
              fontSize:9,color:'var(--text3)',fontWeight:600,textAlign:'left',paddingLeft:2,pointerEvents:'none'}}>
              {fmtMin(t)}
            </div>
          ))}
        </div>

        {/* Grid area */}
        <div ref={gridRef} className="pinch-zoom-area"
          onTouchStart={e=>{
            if(e.touches.length===2){
              e.preventDefault();
              const dx=e.touches[0].clientX-e.touches[1].clientX;
              const dy=e.touches[0].clientY-e.touches[1].clientY;
              pinchRef.current={startDist:Math.sqrt(dx*dx+dy*dy),startZoom:zoomLevel};
            }
          }}
          onTouchMove={e=>{
            if(e.touches.length===2&&pinchRef.current){
              e.preventDefault();
              const dx=e.touches[0].clientX-e.touches[1].clientX;
              const dy=e.touches[0].clientY-e.touches[1].clientY;
              const dist=Math.sqrt(dx*dx+dy*dy);
              const scale=dist/pinchRef.current.startDist;
              const newZoom=Math.min(6,Math.max(1.2,pinchRef.current.startZoom*scale));
              setZoomLevel(Math.round(newZoom*10)/10);
            }
          }}
          onTouchEnd={e=>{if(e.touches.length<2)pinchRef.current=null;}}
          onDragOver={e=>{
            if(!e.dataTransfer.types.includes('paneltaskid')&&!e.dataTransfer.types.includes('growthtaskid'))return;
            e.preventDefault();
            e.dataTransfer.dropEffect='copy';
            setExternalDragOver(true);
            const rect=gridRef.current.getBoundingClientRect();
            const y=e.clientY-rect.top;
            const rawMin=Math.round((y/PX+dayStart)/15)*15;
            setDropPreviewMin(Math.max(dayStart,rawMin));
          }}
          onDragLeave={e=>{
            if(!gridRef.current.contains(e.relatedTarget)){
              setExternalDragOver(false);setDropPreviewMin(null);
            }
          }}
          onDrop={e=>{
            e.preventDefault();
            setExternalDragOver(false);setDropPreviewMin(null);
            const rect=gridRef.current.getBoundingClientRect();
            const y=e.clientY-rect.top;
            const stm=Math.max(dayStart,Math.round((y/PX+dayStart)/15)*15);
            // Check if it's a growth task
            const gid=e.dataTransfer.getData('growthTaskId');
            if(gid){
              const gt=GROWTH_TASKS.find(g=>g.id===gid);
              if(gt){
                setSchedule(p=>[...p,{id:uid(),taskId:null,name:'🌱 '+gt.name,
                  startTime:stm,endTime:stm+gt.duration,done:false,isBreak:false,isFixed:false,
                  isPinned:false,layerNote:null,task:null,note:'פיתוח עצמי — 20 דקות'}]
                  .sort((a,b)=>a.startTime-b.startTime));
                playSound('drop');
              }
              return;
            }
            // Regular task from panel
            const tid=parseInt(e.dataTransfer.getData('panelTaskId'));
            if(!tid)return;
            const t=tasks.find(x=>x.id===tid);
            if(!t)return;
            const dur=taskDur(t);
            setSchedule(p=>[...p,{
              id:uid(),taskId:t.id,name:t.name,
              startTime:stm,endTime:stm+dur,
              done:false,isBreak:false,isFixed:false,
              layerNote:t.layerable?'להקביל: '+t.layerable:null,
              task:t,note:''
            }].sort((a,b)=>a.startTime-b.startTime));
            playSound('drop');
          }}
          style={{flex:1,position:'relative',height:containerH,background:'var(--bg2)',
            borderRadius:8,overflow:'hidden',
            border:externalDragOver?'2px solid var(--green)':'1px solid var(--border)',
            transition:'border .1s'}}>

          {/* Hour grid lines */}
          {hourLabels.map(t=>(
            <div key={t} style={{position:'absolute',top:(t-dayStart)*PX,left:0,right:0,
              height:1,background:'var(--border)',opacity:.6,pointerEvents:'none'}}/>
          ))}
          {/* 30-min lines */}
          {hourLabels.map(t=>(
            (t+30)<=dayEnd&&<div key={t+'h'} style={{position:'absolute',top:(t+30-dayStart)*PX,left:0,right:0,
              height:1,background:'var(--border)',opacity:.2,pointerEvents:'none'}}/>
          ))}

          {/* Current time red line */}
          {nowMinG>=dayStart&&nowMinG<=dayEnd&&(
            <div style={{position:'absolute',top:(nowMinG-dayStart)*PX,left:0,right:0,height:2,
              background:'#EF4444',zIndex:15,boxShadow:'0 0 6px rgba(239,68,68,.6)',pointerEvents:'none'}}>
              <div style={{position:'absolute',right:-1,top:-4,width:10,height:10,
                borderRadius:'50%',background:'#EF4444',boxShadow:'0 0 8px rgba(239,68,68,.8)'}}/>
            </div>
          )}

          {/* Snap guide line — appears during drag at the snapped position */}
          {draggingId&&snapGuideMin!==null&&(
            <div style={{position:'absolute',top:(snapGuideMin-dayStart)*PX-1,left:0,right:0,height:2,
              background:'var(--accent)',zIndex:30,opacity:.85,pointerEvents:'none',
              boxShadow:'0 0 6px var(--accent)'}}>
              <div style={{position:'absolute',right:4,top:-9,fontSize:10,fontWeight:700,
                color:'var(--accent)',background:'var(--card)',borderRadius:4,padding:'1px 4px',
                border:'1px solid var(--accent)'}}>
                {fmtMin(snapGuideMin)}
              </div>
            </div>
          )}

          {/* Drop preview line — shown when dragging from side panel */}
          {externalDragOver&&dropPreviewMin!==null&&(
            <div style={{position:'absolute',top:(dropPreviewMin-dayStart)*PX-1,left:0,right:0,
              height:3,background:'var(--green)',zIndex:30,opacity:.9,pointerEvents:'none',
              boxShadow:'0 0 8px var(--green)'}}>
              <div style={{position:'absolute',right:4,top:-10,fontSize:10,fontWeight:700,
                color:'var(--green)',background:'var(--card)',borderRadius:4,padding:'1px 5px',
                border:'1px solid var(--green)'}}>
                📌 {fmtMin(dropPreviewMin)}
              </div>
            </div>
          )}

          {/* Task cards */}
          {ds.map(item=>{
            const dur=item.endTime-item.startTime;
            const topPx=(item.startTime-dayStart)*PX;
            const h=Math.max(30,dur*PX);
            const isShort=dur<=20;
            const isLong=dur>=60;
            const isDragging=item.id===draggingId;
            const isFocus=item.id===focusItem?.id;
            const isShaking=item.id===shakingId;
            const isSnapPulsing=item.id===snapPulseId&&isDragging;
            const cat=taskCategory(item.name);
            const catStyle=CAT_COLORS[cat];
            const dmgColor=item.task?DC[item.task.damageType]:'var(--border)';
            // Overlap layout — left/right based on column
            const{col,totalCols}=overlapLayout[item.id]||{col:0,totalCols:1};
            const cardLeft=totalCols===1?3:`calc(${col/totalCols*100}% + 3px)`;
            const cardRight=totalCols===1?3:`calc(${(totalCols-col-1)/totalCols*100}% + 3px)`;
            // Hologram color depending on zone
            const holoBg=isDragging?(dragOverPinned?'rgba(239,68,68,0.18)':dragOverGreen?'rgba(34,197,94,0.15)':'rgba(99,102,241,0.12)'):(xrayMode?catStyle.bg:'var(--card)');
            const holoBorder=isDragging?(dragOverPinned?'1px solid rgba(239,68,68,.5)':dragOverGreen?'1px solid rgba(34,197,94,.5)':'1px solid var(--accent)'):(item.isPinned?`2px solid #EAB308`:`1px solid ${xrayMode?catStyle.border:'var(--border)'}`);
            const holoShadow=isDragging?(dragOverPinned?'0 0 0 2px rgba(239,68,68,.5),0 8px 24px rgba(239,68,68,.3)':dragOverGreen?'0 0 0 2px rgba(34,197,94,.5),0 8px 24px rgba(34,197,94,.25)':'0 8px 32px rgba(31,38,135,.45)'):isFocus?'0 0 0 2px var(--accent),0 0 16px rgba(99,102,241,.5)':'none';
            // Focus mode: dim non-focused items
            const itemOpacity=item.done?0.4:(focusItem&&!isFocus&&!isDragging)?0.22:1;
            // Undo flash animation
            const cardAnim=isShaking?'redShake .4s ease':isSnapPulsing?'snapPulse .28s ease':undoFlash?'undoFlash .65s ease':undefined;

            return(
              <div key={item.id}
                                                style={{
                  position:'absolute',top:topPx,left:cardLeft,right:cardRight,height:h,
                  background:holoBg,
                  backdropFilter:isDragging?'blur(10px)':undefined,
                  border:holoBorder,
                  borderRight:isDragging?undefined:`3px solid ${dmgColor}`,
                  borderRadius:6,overflow:'visible',
                  cursor:(item.isPinned&&!isDragging)?'default':isDragging?'grabbing':'grab',
                  opacity:itemOpacity,
                  boxShadow:isShaking?'0 0 0 3px rgba(239,68,68,.7)':holoShadow,
                  animation:cardAnim,
                  transition:draggingId&&!isShaking?'none':'top .18s ease, height .18s ease, opacity .2s',
                  zIndex:isDragging?25:isFocus?5:1,
                }}
                onMouseDown={e=>startGridDrag(e,item,'move')}
                onTouchStart={e=>{
                  if(e.touches.length!==1)return;
                  const touch=e.touches[0];
                  longPressReady.current=false;
                  longPressTimer.current=setTimeout(()=>{
                    longPressReady.current=true;
                    // Vibrate if available
                    if(navigator.vibrate)navigator.vibrate(30);
                    startGridDrag({touches:[touch],preventDefault:()=>{},stopPropagation:()=>{}},item,'move');
                  },400);
                }}
                onTouchEnd={e=>{clearTimeout(longPressTimer.current);longPressReady.current=false;}}
                onTouchMove={e=>{
                  // If long press hasn't fired yet, cancel it (user is scrolling)
                  if(!longPressReady.current){clearTimeout(longPressTimer.current);}
                }}>

                {/* Scan-line animation when dragging */}
                {isDragging&&(
                  <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none',borderRadius:6}}>
                    <div style={{position:'absolute',left:0,right:0,height:2,background:'var(--accent2)',opacity:0.4,animation:'scanLine 1.4s linear infinite'}}/>
                  </div>
                )}

                {/* Pinned indicator strip */}
                {item.isPinned&&(
                  <div style={{position:'absolute',top:0,left:0,right:0,height:2,background:'#EAB308'}}/>
                )}

                {/* Content */}
                  <div style={{
                    padding:isShort?'3px 5px':'6px 8px',
                    height:'calc(100% - 8px)',
                    display:'flex',
                    flexDirection:isShort?'row':'column',
                    alignItems:isShort?'center':'flex-start',
                    gap:isShort?5:3,
                    overflow:'hidden',
                  }}>
                    {/* Time label */}
                    <div style={{fontSize:isShort?9:10,color:'var(--text3)',whiteSpace:'nowrap',flexShrink:0}}>
                      {isShort?fmtMin(item.startTime):`${fmtDuration(dur)} · ${fmtMin(item.startTime)}–${fmtMin(item.endTime)}`}
                    </div>

                    {/* Task name */}
                    <div style={{
                      fontSize:isShort?11:isLong?14:13,fontWeight:600,
                      color:item.done?'var(--text3)':item.isBreak?'var(--text3)':'var(--text)',
                      textDecoration:item.done?'line-through':'none',
                      whiteSpace:'normal',wordBreak:'break-word',flex:1,
                    }}>
                      {item.isPinned&&<span style={{fontSize:9,marginLeft:3,color:'#EAB308'}}>📌</span>}
                      {item.isBreak?'☕ ':item.task?domainEmoji(item.task.domain)+' ':''}{item.name}
                    </div>

                    {/* Badges (only non-short) */}
                    {!isShort&&(
                      <div style={{display:'flex',gap:3,alignItems:'center',flexWrap:'wrap'}}>
                        {item.task&&<RBadge rating={item.task.rating}/>}
                        {item.isFixed&&<span style={{fontSize:9,color:'var(--accent2)'}}>⚓</span>}
                        {item.task?.deadline&&item.task.deadline!=='weekly-thursday'&&(
                          <span style={{fontSize:10,color:dlColor(daysLeft(item.task.deadline)),fontWeight:700}}>⏳{daysLeft(item.task.deadline)}י</span>
                        )}
                        {item.dependsOn&&(()=>{
                          const dep=schedule.find(i=>i.id===item.dependsOn);
                          if(!dep)return null;
                          return <span style={{fontSize:9,color:dep.done?'var(--green)':'var(--orange)',fontWeight:700}}>
                            {dep.done?'🔓 שוחרר':'🔗 תלוי ב: '+dep.name.slice(0,15)}
                          </span>;
                        })()}
                        {item.splitGroup&&<span style={{fontSize:9,color:'var(--accent2)'}}>✂️</span>}
                      </div>
                    )}

                    {/* Layer note for long tasks */}
                    {isLong&&item.layerNote&&(
                      <div style={{fontSize:10,color:'var(--text3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                        🎧 {item.layerNote}
                      </div>
                    )}

                    {/* Note */}
                    {!isShort&&item.note&&(
                      <div style={{fontSize:10,color:'var(--accent2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>📝 {item.note}</div>
                    )}
                  </div>

                  {/* Action buttons — always visible, positioned bottom-left for short cards */}
                  <div style={{
                      position:'absolute',
                      top:isShort?'auto':3,
                      bottom:isShort?10:'auto',
                      left:3,
                      display:'flex',gap:2,
                      flexWrap:'nowrap',
                      zIndex:10,
                    }}
                    onMouseDown={e=>e.stopPropagation()}>
                    {!item.isBreak&&(
                      <button className="action-btn" style={{fontSize:18,padding:'4px 6px',opacity:.9,minWidth:34,minHeight:34}}
                        onClick={e=>{e.stopPropagation();toggleDone(item.id);}}>
                        {item.done?'✅':'⬜'}
                      </button>
                    )}
                    <button className="action-btn" style={{fontSize:10,padding:'1px 4px',opacity:.7}}
                      onClick={e=>{e.stopPropagation();setEditItem(item);}}>✏️</button>
                    <button className="action-btn"
                      style={{fontSize:10,padding:'1px 4px',opacity:.7,color:item.isPinned?'#EAB308':'var(--text3)'}}
                      title={item.isPinned?'שחרר עוגן':'נעל עוגן'}
                      onClick={e=>{e.stopPropagation();setSchedule(p=>p.map(i=>i.id===item.id?{...i,isPinned:!i.isPinned}:i));}}>
                      {item.isPinned?'🔓':'🔒'}
                    </button>
                    {!item.isBreak&&(
                      <div style={{position:'relative'}} onMouseDown={e=>e.stopPropagation()}>
                        <button className="action-btn" style={{fontSize:10,padding:'1px 4px',opacity:.7}}
                          onClick={e=>{e.stopPropagation();setPostponeOpen(postponeOpen===item.id?null:item.id);}}>📅</button>
                        {postponeOpen===item.id&&(
                          <div className="postpone-menu">
                            <button className="postpone-opt" onClick={()=>postponeItem(item.id,'מחר')}>📅 מחר</button>
                            <button className="postpone-opt" onClick={()=>postponeItem(item.id,'חניון')}>🅿️ חניון</button>
                            <button className="postpone-opt" onClick={()=>postponeItem(item.id,'מאגר')}>📦 מאגר</button>
                          </div>
                        )}
                      </div>
                    )}
                    {/* Split task button */}
                    {!item.isBreak&&!isShort&&(
                      <div style={{position:'relative'}} onMouseDown={e=>e.stopPropagation()}>
                        <button className="action-btn" style={{fontSize:10,padding:'1px 4px',opacity:.7}}
                          title="פצל משימה"
                          onClick={e=>{e.stopPropagation();setSplitMenu(splitMenu===item.id?null:item.id);}}>✂️</button>
                        {splitMenu===item.id&&(
                          <div className="postpone-menu" style={{minWidth:120}}>
                            <div style={{fontSize:10,color:'var(--text3)',padding:'4px 8px',fontWeight:700}}>פצל ל:</div>
                            {[2,3,4].map(n=>(
                              <button key={n} className="postpone-opt" onClick={()=>splitTask(item.id,n)}>✂️ {n} חלקים</button>
                            ))}
                          </div>
                        )}
                      </div>
                    )}
                    {/* Dependency button */}
                    {!item.isBreak&&!isShort&&(
                      <div style={{position:'relative'}} onMouseDown={e=>e.stopPropagation()}>
                        <button className="action-btn"
                          style={{fontSize:10,padding:'1px 4px',opacity:.7,color:item.dependsOn?'var(--orange)':'var(--text3)'}}
                          title={item.dependsOn?'הסר תלות':'הגדר תלות'}
                          onClick={e=>{
                            e.stopPropagation();
                            if(item.dependsOn){removeDependency(item.id);}
                            else{setShowDepPicker(showDepPicker===item.id?null:item.id);}
                          }}>🔗</button>
                        {showDepPicker===item.id&&(
                          <div className="postpone-menu" style={{minWidth:170,maxHeight:200,overflowY:'auto'}}>
                            <div style={{fontSize:10,color:'var(--text3)',padding:'4px 8px',fontWeight:700}}>תלוי ב:</div>
                            {schedule.filter(i=>i.id!==item.id&&!i.isBreak).map(dep=>(
                              <button key={dep.id} className="postpone-opt" style={{fontSize:11}}
                                onClick={()=>addDependency(item.id,dep.id)}>
                                {fmtMin(dep.startTime)} {dep.name.slice(0,25)}{dep.name.length>25?'…':''}
                              </button>
                            ))}
                          </div>
                        )}
                      </div>
                    )}
                    <button className="action-btn" style={{fontSize:10,padding:'1px 4px',opacity:.7}}
                      onClick={e=>{e.stopPropagation();removeItem(item.id);}}>🗑️</button>
                  </div>

                {/* Blocked overlay for dependencies */}
                {isBlocked(item)&&(
                  <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.45)',borderRadius:6,
                    display:'flex',alignItems:'center',justifyContent:'center',zIndex:20,pointerEvents:'none'}}>
                    <div style={{background:'rgba(249,115,22,.9)',color:'#fff',padding:'4px 12px',borderRadius:8,
                      fontSize:12,fontWeight:800,display:'flex',alignItems:'center',gap:5}}>
                      🔒 חסום — ממתין ל: {schedule.find(i=>i.id===item.dependsOn)?.name?.slice(0,20)||'...'}
                    </div>
                  </div>
                )}

                {/* Resize handle */}
                <div
                  style={{position:'absolute',bottom:0,left:0,right:0,height:8,
                    cursor:'ns-resize',background:'transparent',
                    display:'flex',alignItems:'center',justifyContent:'center'}}
                  onMouseDown={e=>{e.stopPropagation();startGridDrag(e,item,'resize');}}
                  onTouchStart={e=>{e.stopPropagation();startGridDrag(e,item,'resize');}}>
                  <div style={{width:22,height:2,borderRadius:1,background:'var(--border)'}}/>
                </div>
              </div>
            );
          })}

          {/* ── Dependency arrows SVG overlay ── */}
          {(()=>{
            const deps=ds.filter(i=>i.dependsOn);
            if(!deps.length)return null;
            return(
              <svg style={{position:'absolute',inset:0,pointerEvents:'none',zIndex:18,overflow:'visible'}}>
                <defs>
                  <marker id="depArrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
                    <path d="M0,1 L6,4 L0,7" fill="none" stroke="#F97316" strokeWidth="1.5"/>
                  </marker>
                  <marker id="depArrowDone" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
                    <path d="M0,1 L6,4 L0,7" fill="none" stroke="#22C55E" strokeWidth="1.5"/>
                  </marker>
                </defs>
                {deps.map(item=>{
                  const dep=ds.find(i=>i.id===item.dependsOn);
                  if(!dep)return null;
                  const depDone=dep.done;
                  const fromY=(dep.endTime-dayStart)*PX;
                  const toY=(item.startTime-dayStart)*PX;
                  const midX=20;
                  const color=depDone?'#22C55E':'#F97316';
                  const dash=depDone?'4,4':'6,3';
                  return(
                    <g key={item.id+'-dep'}>
                      <path d={`M ${midX},${fromY} C ${midX-15},${(fromY+toY)/2} ${midX-15},${(fromY+toY)/2} ${midX},${toY}`}
                        fill="none" stroke={color} strokeWidth="2" strokeDasharray={dash}
                        markerEnd={depDone?'url(#depArrowDone)':'url(#depArrow)'}
                        opacity={depDone?0.5:0.8}/>
                      {!depDone&&(
                        <text x={midX-3} y={(fromY+toY)/2} fill={color} fontSize="10" fontWeight="800"
                          textAnchor="end" dominantBaseline="middle">🔗</text>
                      )}
                      {depDone&&(
                        <text x={midX-3} y={(fromY+toY)/2} fill={color} fontSize="10" fontWeight="800"
                          textAnchor="end" dominantBaseline="middle">✓</text>
                      )}
                    </g>
                  );
                })}
              </svg>
            );
          })()}
        </div>
      </div>
      </div>{/* end Time Grid column */}

      {/* Task Panel (side panel) — with tabs */}
      {showSidePanel&&(
        <div style={{
          width:240,flexShrink:0,direction:'rtl',
          background:'var(--card)',border:'1px solid var(--border)',
          borderRadius:8,padding:'8px',
          maxHeight:containerH+40,overflowY:'auto',
        }}>
          {/* Tab switcher */}
          <div style={{display:'flex',gap:0,marginBottom:8,borderRadius:6,overflow:'hidden',border:'1px solid var(--border)'}}>
            <button onClick={()=>setSidePanelTab('tasks')}
              style={{flex:1,padding:'6px',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit',border:'none',
                background:sidePanelTab==='tasks'?'var(--accent)':'transparent',
                color:sidePanelTab==='tasks'?'#fff':'var(--text3)'}}>
              📦 מאגר
            </button>
            <button onClick={()=>setSidePanelTab('growth')}
              style={{flex:1,padding:'6px',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit',border:'none',
                background:sidePanelTab==='growth'?'rgba(34,197,94,.8)':'transparent',
                color:sidePanelTab==='growth'?'#fff':'var(--text3)'}}>
              🌱 פיתוח עצמי
            </button>
          </div>

          {sidePanelTab==='tasks'&&(()=>{
            const filtered=tasks.filter(t=>{
              if(panelRating&&t.rating!==panelRating)return false;
              if(panelSearch&&!t.name.includes(panelSearch))return false;
              return true;
            }).sort((a,b)=>{
              const ro=['A','B','C','D','E'];
              return ro.indexOf(a.rating)-ro.indexOf(b.rating)||b.matrixScore-a.matrixScore;
            });
            const RC2={A:'var(--ra)',B:'var(--rb)',C:'var(--rc)',D:'var(--rd)',E:'var(--re)'};
            return(<>
              <input value={panelSearch} onChange={e=>setPanelSearch(e.target.value)}
                placeholder="חיפוש..." style={{fontSize:11,padding:'4px 8px',marginBottom:6,width:'100%'}}/>
              <div style={{display:'flex',gap:4,marginBottom:8,flexWrap:'wrap'}}>
                {['','A','B','C','D','E'].map(r=>(
                  <button key={r} onClick={()=>setPanelRating(r)}
                    style={{padding:'2px 7px',borderRadius:5,fontSize:10,fontWeight:700,cursor:'pointer',fontFamily:'inherit',
                      border:`1px solid ${panelRating===r?'var(--accent)':'var(--border)'}`,
                      background:panelRating===r?'rgba(99,102,241,.15)':'transparent',
                      color:panelRating===r?'var(--accent)':r?RC2[r]:'var(--text3)'}}>
                    {r||'הכל'}
                  </button>
                ))}
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:4}}>
                {filtered.map(t=>{
                  const alreadyInSchedule=schedule.some(s=>s.taskId===t.id);
                  return(
                    <div key={t.id}
                      draggable
                      onDragStart={e=>{
                        e.dataTransfer.setData('panelTaskId',String(t.id));
                        e.dataTransfer.effectAllowed='copy';
                      }}
                      style={{
                        display:'flex',alignItems:'center',gap:6,
                        padding:'6px 8px',borderRadius:7,
                        background:alreadyInSchedule?'rgba(34,197,94,.07)':'var(--bg2)',
                        border:`1px solid ${alreadyInSchedule?'rgba(34,197,94,.25)':'var(--border)'}`,
                        cursor:'grab',opacity:alreadyInSchedule?.7:1,
                        transition:'opacity .15s',
                      }}>
                      <span style={{background:RC2[t.rating],color:'#fff',borderRadius:4,
                        padding:'1px 5px',fontSize:10,fontWeight:800,flexShrink:0}}>
                        {t.rating}
                      </span>
                      <span style={{fontSize:11,fontWeight:600,flex:1,color:'var(--text)',
                        wordBreak:'break-word',lineHeight:1.3}}>
                        {t.name}
                      </span>
                      <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:1,flexShrink:0}}>
                        {alreadyInSchedule&&<span style={{fontSize:9,color:'var(--green)'}}>✓</span>}
                        <LastDoneBadge history={history} taskId={t.id} taskName={t.name}/>
                      </div>
                    </div>
                  );
                })}
                {filtered.length===0&&<div style={{fontSize:11,color:'var(--text3)',textAlign:'center',padding:12}}>אין משימות</div>}
              </div>
            </>);
          })()}

          {sidePanelTab==='growth'&&(
            <div>
              <div style={{fontSize:10,color:'var(--text3)',marginBottom:8,lineHeight:1.5}}>
                🌱 כל יום מקבל משימת פיתוח עצמי אחת (20 דק). גרור ← ללוז.
              </div>
              <div style={{padding:'8px',background:'rgba(34,197,94,.08)',border:'1px solid rgba(34,197,94,.25)',borderRadius:8,marginBottom:8}}>
                <div style={{fontSize:10,color:'var(--green)',fontWeight:700,marginBottom:4}}>✨ המשימה של היום:</div>
                <div style={{fontSize:13,fontWeight:700}}>{getGrowthTaskForDate(new Date().toISOString().split('T')[0]).name}</div>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:4}}>
                {GROWTH_TASKS.map(gt=>{
                  const alreadyIn=schedule.some(s=>s.name.includes(gt.name));
                  const isToday=getGrowthTaskForDate(new Date().toISOString().split('T')[0]).id===gt.id;
                  return(
                    <div key={gt.id}
                      draggable
                      onDragStart={e=>{
                        e.dataTransfer.setData('growthTaskId',gt.id);
                        e.dataTransfer.effectAllowed='copy';
                      }}
                      onClick={()=>{
                        if(alreadyIn)return;
                        const st=schedule.length?schedule[schedule.length-1].endTime:9*60;
                        setSchedule(p=>[...p,{id:uid(),taskId:null,name:'🌱 '+gt.name,
                          startTime:st,endTime:st+gt.duration,done:false,isBreak:false,isFixed:false,
                          isPinned:false,layerNote:null,task:null,note:'פיתוח עצמי — 20 דקות'}]
                          .sort((a,b)=>a.startTime-b.startTime));
                      }}
                      style={{
                        display:'flex',alignItems:'center',gap:6,
                        padding:'8px',borderRadius:7,cursor:alreadyIn?'default':'pointer',
                        background:isToday?'rgba(34,197,94,.12)':alreadyIn?'rgba(34,197,94,.05)':'var(--bg2)',
                        border:`1px solid ${isToday?'rgba(34,197,94,.4)':alreadyIn?'rgba(34,197,94,.2)':'var(--border)'}`,
                        opacity:alreadyIn?.5:1,
                        transition:'.15s',
                      }}>
                      <span style={{fontSize:16}}>{gt.name.split(' ')[0]}</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:11,fontWeight:600,color:'var(--text)',lineHeight:1.3}}>
                          {gt.name}
                        </div>
                        <div style={{fontSize:9,color:'var(--text3)'}}>{gt.duration} דק · {gt.domain}</div>
                      </div>
                      <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:1,flexShrink:0}}>
                        {alreadyIn&&<span style={{fontSize:9,color:'var(--green)'}}>✓</span>}
                        {isToday&&!alreadyIn&&<span style={{fontSize:9,color:'var(--green)',fontWeight:700}}>היום</span>}
                        <LastDoneBadge history={history} taskId={null} taskName={gt.name}/>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      )}

      </div>{/* end split view container */}

      {/* ── Bottom actions ── */}
      <div data-declutter-hide style={{display:'flex',gap:5,marginBottom:10,flexWrap:'wrap'}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>setShowAdd(true)}>+ הוסף</button>
        <button className="btn btn-ghost btn-sm" onClick={()=>addBreak(15)}>☕ 15′</button>
        <button className="btn btn-ghost btn-sm" onClick={()=>addBreak(30)}>☕ 30′</button>
        <button className="btn btn-ghost btn-sm" onClick={()=>addBreak(60)}>☕ שעה</button>
      </div>

      <button onClick={saveChanges}
        style={{width:'100%',marginBottom:6,padding:'13px',borderRadius:12,border:'none',
          background:saveMsg?'var(--green)':'linear-gradient(135deg,#22c55e,#16a34a)',
          color:'#fff',fontFamily:'Heebo,sans-serif',fontSize:16,fontWeight:700,
          cursor:'pointer',transition:'background .3s',
          boxShadow:saveMsg?'0 0 0 2px #22c55e44':'0 4px 16px rgba(34,197,94,.3)'}}>
        {saveMsg||'💾 שמור שינויים'}
      </button>
      <div style={{fontSize:11,color:'var(--text3)',textAlign:'center',marginBottom:6}}>
        מסנכרן עם הלוז השבועי וסיכום השבוע
      </div>

      {/* ── Parking Lot ── */}
      {parkedItems&&parkedItems.length>0&&(
        <div style={{marginTop:14,padding:'10px 12px',background:'rgba(34,197,94,.04)',border:'1px solid rgba(34,197,94,.2)',borderRadius:10}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--text2)',marginBottom:8}}>🅿️ חניון — {parkedItems.length} משימות ממתינות</div>
          {parkedItems.map(pi=>{
            const days=Math.floor((Date.now()-pi.parkedAt)/86400000);
            const fade=Math.max(0.2,1-days*0.08);
            const gray=days>=7?`grayscale(${Math.min(80,(days-7)*14)}%)`:'none';
            return(
              <div key={pi.id}
                style={{display:'flex',alignItems:'center',gap:8,padding:'7px 10px',borderRadius:8,
                  border:'1px solid var(--border)',background:'var(--bg2)',marginBottom:4,
                  opacity:fade,filter:gray,transition:'opacity .3s,filter .3s',animation:'parkFade .3s ease'}}
                onMouseEnter={e=>{e.currentTarget.style.opacity='1';e.currentTarget.style.filter='none';}}
                onMouseLeave={e=>{e.currentTarget.style.opacity=fade;e.currentTarget.style.filter=gray;}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{pi.name}</div>
                  <div style={{fontSize:10,color:days>=10?'var(--orange)':'var(--text3)',marginTop:1}}>
                    🅿️ {days===0?'נחנה היום':days===1?'אתמול':`${days} ימים בחנייה`}{days>=10?' ⚠️ מתיישן!':''}
                    {pi.duration&&<span style={{color:'var(--text3)'}}> · {fmtDuration(pi.duration)}</span>}
                  </div>
                </div>
                <button className="btn btn-ghost btn-sm" onClick={()=>{
                  const st=schedule.length?schedule[schedule.length-1].endTime:parseMin(wakeTime)+90;
                  const dur=pi.duration||30;
                  setSchedule(p=>[...p,{id:uid(),taskId:pi.taskId||null,name:pi.name,startTime:st,endTime:st+dur,done:false,isBreak:false,isFixed:false,layerNote:pi.layerNote||null,task:pi.task||null,note:pi.note||''}].sort((a,b)=>a.startTime-b.startTime));
                  if(setParkedItems)setParkedItems(p=>p.filter(x=>x.id!==pi.id));
                }}>+ ללוז</button>
                <button className="action-btn" onClick={()=>{if(setParkedItems)setParkedItems(p=>p.filter(x=>x.id!==pi.id));}}>🗑️</button>
              </div>
            );
          })}
        </div>
      )}

      </div>{/* ═══ END SCROLLABLE CONTENT ═══ */}

      {editItem&&<ScheduleItemEditModal item={editItem} onSave={updated=>{setSchedule(p=>p.map(i=>i.id===updated.id?updated:i));setEditItem(null);}} onClose={()=>setEditItem(null)}/>}
      {showAdd&&<AddToScheduleModal tasks={tasks} setTasks={setTasks} setSchedule={setSchedule} onClose={()=>setShowAdd(false)}/>}
    </div>
  );
}

function ScheduleItemEditModal({item,onSave,onClose}){
  const dur=item.endTime-item.startTime;
  const t=item.task||null;
  const [form,setForm]=useState({
    name:item.name||'',
    st:fmtMin(item.startTime),
    durMin:dur,
    note:item.note||'',
    rating:t?.rating||'C',
    quadrant:t?.quadrant||2,
    domain:t?.domain||'',
    matrixScore:t?.matrixScore||20,
    damageType:t?.damageType||'fixed-daily',
    deadline:t?.deadline||'',
    timeRequired:t?.timeRequired||'',
    frequency:t?.frequency||'',
    size:t?.size||'בינונית',
    energyRequired:t?.energyRequired||'בינונית',
    energyEffect:t?.energyEffect||'ניטרלי',
    entryBarrier:t?.entryBarrier||'התארגנות קלה',
    layerable:t?.layerable||false,
    dominoEffect:t?.dominoEffect||'',
    alertProfile:t?.alertProfile||'auto',
    requiresTravel:t?.requiresTravel||false,
  });
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  function save(){
    const stm=parseMin(form.st);
    const updatedTask=item.task?{...item.task,
      name:form.name,rating:form.rating,quadrant:form.quadrant,domain:form.domain,
      matrixScore:form.matrixScore,damageType:form.damageType,deadline:form.deadline||null,
      timeRequired:form.timeRequired,frequency:form.frequency,size:form.size,
      energyRequired:form.energyRequired,energyEffect:form.energyEffect,entryBarrier:form.entryBarrier,
      layerable:form.layerable,dominoEffect:form.dominoEffect,
      alertProfile:form.alertProfile,requiresTravel:form.requiresTravel,
    }:null;
    onSave({...item,name:form.name,startTime:stm,endTime:stm+Number(form.durMin),
      note:form.note.trim()||undefined,task:updatedTask});
  }

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:17,fontWeight:700,marginBottom:14}}>✏️ עריכת פריט בלוז</div>
        <div className="form-grid">
          <div>
            <label>שם המשימה *</label>
            <input value={form.name} onChange={e=>set('name',e.target.value)} placeholder="שם המשימה"/>
          </div>
          <div className="form-row">
            <div>
              <label>שעת התחלה</label>
              <input type="time" value={form.st} onChange={e=>set('st',e.target.value)}/>
            </div>
            <div>
              <label>משך (דקות)</label>
              <input type="number" min={5} max={480} step={5} value={form.durMin} onChange={e=>set('durMin',e.target.value)}/>
            </div>
          </div>
          <div className="form-row">
            <div>
              <label>דירוג ABCDE</label>
              <select value={form.rating} onChange={e=>set('rating',e.target.value)}>
                {['A','B','C','D','E'].map(r=><option key={r} value={r}>{r}</option>)}
              </select>
            </div>
            <div>
              <label>רביע אייזנהאואר</label>
              <select value={form.quadrant} onChange={e=>set('quadrant',Number(e.target.value))}>
                {[1,2,3,4].map(q=><option key={q} value={q}>{q}</option>)}
              </select>
            </div>
          </div>
          <div>
            <label>תחום</label>
            <input value={form.domain} onChange={e=>set('domain',e.target.value)} placeholder="אקדמיה, בריאות..."/>
          </div>
          <MatrixCalculator value={form.matrixScore} onChange={v=>set('matrixScore',v)}/>
          <div className="form-row">
            <div>
              <label>סוג נזק</label>
              <select value={form.damageType} onChange={e=>set('damageType',e.target.value)}>
                <option value="hard-deadline">🔴 דדליין קשיח</option>
                <option value="growing">🟠 הנזק גדל כל יום</option>
                <option value="fixed-daily">🟡 נזק קבוע ליום</option>
                <option value="zero">🟢 אפס נזק</option>
              </select>
            </div>
            <div>
              <label>דדליין</label>
              <input type="date" value={form.deadline||''} onChange={e=>set('deadline',e.target.value||null)}/>
            </div>
          </div>
          <div className="form-row">
            <div>
              <label>זמן לביצוע</label>
              <input value={form.timeRequired} onChange={e=>set('timeRequired',e.target.value)} placeholder="3 שעות/יום"/>
            </div>
            <div>
              <label>תדירות</label>
              <input value={form.frequency} onChange={e=>set('frequency',e.target.value)} placeholder="יומי"/>
            </div>
          </div>
          <div className="form-row">
            <div>
              <label>גודל</label>
              <select value={form.size} onChange={e=>set('size',e.target.value)}>
                <option value="גדולה">גדולה</option><option value="בינונית">בינונית</option><option value="קטנה">קטנה</option>
              </select>
            </div>
            <div>
              <label>אנרגיה נדרשת</label>
              <select value={form.energyRequired} onChange={e=>set('energyRequired',e.target.value)}>
                <option value="גבוהה">גבוהה</option><option value="בינונית">בינונית</option><option value="נמוכה">נמוכה</option><option value="אפס">אפס</option>
              </select>
            </div>
          </div>
          <div className="form-row">
            <div>

    layerable:false,dominoEffect:''

    setSel(id);
