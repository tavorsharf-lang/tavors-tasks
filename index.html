      const t=tasks.find(x=>x.id===Number(id));
      if(t) setDur(taskDur(t));
    }

  function add(){
    const stm=parseMin(st);
    if(mode==='pick'){
      const t=tasks.find(x=>x.id===Number(sel));
      setSchedule(p=>[...p,{id:uid(),taskId:t?t.id:null,name:t?t.name:'',

function TaskRepositoryScreen({tasks,setTasks,history}){
  const [sk,setSk]=useState('matrixScore');
  const [sd,setSd]=useState(-1);
  const [q,setQ]=useState('');
  const [fR,setFR]=useState('');
  const [fD,setFD]=useState('');
  const [fDmg,setFDmg]=useState('');
  const [fQ,setFQ]=useState('');
  const [compact,setCompact]=useState(false);
  const [editT,setEditT]=useState(null);
  const [showAdd,setShowAdd]=useState(false);

  function sortClick(k){if(sk===k)setSd(d=>-d);else{setSk(k);setSd(-1);}}

  const domains=[...new Set(tasks.map(t=>t.domain))].sort();

  const rows=[...tasks]
    .filter(t=>!q||t.name.includes(q))
    .filter(t=>!fR||t.rating===fR)
    .filter(t=>!fD||t.domain===fD)
    .filter(t=>!fDmg||t.damageType===fDmg)
    .filter(t=>!fQ||String(t.quadrant)===fQ)
    .sort((a,b)=>{
      if(sk==='name') return sd*a.name.localeCompare(b.name,'he');
      if(sk==='timeRequired'){
        // parse first number found in string, e.g. "3 שעות/יום"→180, "30 דקות"→30, "10 דקות"→10
        function toMins(s){
          if(!s)return 9999;
          const m=s.match(/(\d+(?:\.\d+)?)/);if(!m)return 9999;
          const n=parseFloat(m[1]);
          if(s.includes('שעה')||s.includes('שעות'))return n*60;
          return n;
        }
        return sd*(toMins(a.timeRequired)-toMins(b.timeRequired));
      }
      if(sk==='damageType'){
        const order={'hard-deadline':4,'growing':3,'fixed-daily':2,'zero':1};
        return sd*((order[a.damageType]||0)-(order[b.damageType]||0));
      }
      let av=a[sk],bv=b[sk];
      if(sk==='daysLeft'){av=daysLeft(a.deadline)??9999;bv=daysLeft(b.deadline)??9999;}
      if(typeof av==='string')return sd*av.localeCompare(bv,'he');
      return sd*((av||0)-(bv||0));
    });

  function del(id){if(window.confirm('למחוק?'))setTasks(p=>p.filter(t=>t.id!==id));}
  function save(t){
    if(t.id)setTasks(p=>p.map(x=>x.id===t.id?t:x));
    else setTasks(p=>[...p,{...t,id:uid()}]);
    setEditT(null);setShowAdd(false);
  }

  const Th=({k,ch})=>(
    <th onClick={()=>sortClick(k)}>
      {sk===k&&<span style={{fontSize:9,marginLeft:3}}>{sd===-1?'↓':'↑'}</span>}
      {ch}
    </th>
  );

  return(
    <div className="fi">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <h2 className="section-title" style={{margin:0}}>📦 מאגר ({tasks.length})</h2>
        <div style={{display:'flex',gap:5}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>setCompact(c=>!c)}>{compact?'📊 מורחב':'📋 מקוצר'}</button>
          <button className="btn btn-primary btn-sm" onClick={()=>setShowAdd(true)}>+ הוסף</button>
        </div>
      </div>

      <div className="filter-row">
        <input style={{flex:2,minWidth:140}} placeholder="🔍 חיפוש..." value={q} onChange={e=>setQ(e.target.value)}/>
        <select className="filter-select" value={fR} onChange={e=>setFR(e.target.value)}>
          <option value="">דירוג</option>
          {['A','B','C','D','E'].map(r=><option key={r} value={r}>{r}</option>)}
        </select>
        <select className="filter-select" value={fQ} onChange={e=>setFQ(e.target.value)}>
          <option value="">רביע</option>
          {[1,2,3,4].map(x=><option key={x} value={x}>{x}</option>)}
        </select>
        <select className="filter-select" value={fD} onChange={e=>setFD(e.target.value)}>
          <option value="">תחום</option>
          {domains.map(d=><option key={d} value={d}>{domainEmoji(d)} {d}</option>)}
        </select>
        <select className="filter-select" value={fDmg} onChange={e=>setFDmg(e.target.value)}>
          <option value="">נזק</option>
          <option value="hard-deadline">🔴 דדליין קשיח</option>
          <option value="growing">🟠 גדל כל יום</option>
          <option value="fixed-daily">🟡 קבוע ליום</option>
          <option value="zero">🟢 אפס נזק</option>
        </select>
        {(q||fR||fD||fDmg||fQ)&&<button className="btn btn-ghost btn-sm" onClick={()=>{setQ('');setFR('');setFD('');setFDmg('');setFQ('');}}>✕</button>}
      </div>

      <div className="table-wrapper">
        <table className="task-table">
          <thead>
            <tr>
              <Th k="id" ch="#"/>
              <Th k="name" ch="שם"/>
              <Th k="rating" ch="דירוג"/>
              <Th k="quadrant" ch="רביע"/>
              {!compact&&<Th k="domain" ch="תחום"/>}
              <Th k="matrixScore" ch="ציון"/>
              <Th k="damageType" ch="נזק"/>
              <Th k="deadline" ch="דדליין"/>
              <Th k="daysLeft" ch="ימים"/>
              {!compact&&<Th k="timeRequired" ch="זמן"/>}
              {!compact&&<th>גודל</th>}
              {!compact&&<th>אנרגיה</th>}
              {!compact&&<th>אפקט</th>}
              {!compact&&<th>להקביל</th>}
              <th>פעולות</th>
            </tr>
          </thead>
          <tbody>
            {rows.map(t=>{
              const d=daysLeft(t.deadline);
              return(
                <tr key={t.id} onClick={()=>setEditT(t)}>
                  <td style={{color:'var(--text3)'}}>{t.id}</td>
                  <td style={{fontWeight:600,minWidth:150}}>{t.name} <LastDoneBadge history={history} taskId={t.id} taskName={t.name}/></td>
                  <td><RBadge rating={t.rating}/></td>
                  <td style={{textAlign:'center'}}>{t.quadrant}</td>
                  {!compact&&<td style={{fontSize:12,whiteSpace:'nowrap'}}><span title={t.domain}>{domainEmoji(t.domain)}</span> <span style={{color:'var(--text2)'}}>{t.domain}</span></td>}
                  <td style={{fontWeight:700,color:'var(--accent2)'}}>{t.matrixScore}</td>
                  <td><span title={DL[t.damageType]} style={{cursor:'help',fontSize:16}}>{DI[t.damageType]}</span></td>
                  <td style={{fontSize:12,whiteSpace:'nowrap',color:'var(--text2)'}}>
                    {t.deadline==='weekly-thursday'?'כל חמישי':t.deadline?fmtDate(t.deadline):'—'}
                  </td>
                  <td style={{fontWeight:700,color:d!==null?dlColor(d):'var(--text3)'}}>{d!==null?d:'—'}</td>
                  {!compact&&<td style={{fontSize:12,color:'var(--text2)',whiteSpace:'nowrap'}}>{t.timeRequired}</td>}
                  {!compact&&<td style={{fontSize:12}}>{t.size}</td>}
                  {!compact&&<td style={{fontSize:12}}>{t.energyRequired}</td>}
                  {!compact&&<td style={{fontSize:12}}>{t.energyEffect}</td>}
                  {!compact&&<td style={{fontSize:12,color:t.layerable?'var(--green)':'var(--text3)'}}>{t.layerable?'✓':'✗'}</td>}
                  <td onClick={e=>e.stopPropagation()} style={{whiteSpace:'nowrap'}}>
                    <button className="action-btn" style={{fontSize:16,padding:'4px 6px'}} onClick={()=>setEditT(t)}>✏️</button>
                    <button className="action-btn" style={{fontSize:16,padding:'4px 6px',color:'var(--red)'}} onClick={()=>del(t.id)}>🗑️</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {(editT||showAdd)&&(
        <TaskEditModal task={editT} onSave={save} onClose={()=>{setEditT(null);setShowAdd(false);}}/>
      )}
    </div>
  );
}

function MatrixCalculator({value,onChange}){
  const [open,setOpen]=useState(false);
  const [impact,setImpact]=useState(3);
  const [delay,setDelay]=useState(3);
  const [effort,setEffort]=useState(3);
  const [energy,setEnergy]=useState(3);
  const calc=impact*3+delay*3+effort*2+energy*2;

  const impactLabels=['0 — אפס','1 — כמעט לא מקדם','2 — מקדם קצת','3 — מקדם בינוני','4 — מקדם מאוד','5 — משנה חיים'];

  }

  return(
    <div style={{background:'var(--bg2)',border:'1px solid var(--accent)',borderRadius:12,padding:'14px',marginTop:4}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>

        <button onClick={()=>setOpen(false)} style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:14}}>✕</button>

      <ScoreRow label="⏰ עלות עיכוב" val={delay} setVal={setDelay} labels={delayLabels} weight={3}/>
      <ScoreRow label="💪 מאמץ נדרש (הפוך)" val={effort} setVal={setEffort} labels={effortLabels} weight={2}/>
      <ScoreRow label="⚡ אנרגיה נדרשת (הפוך)" val={energy} setVal={setEnergy} labels={energyLabels} weight={2}/>

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',
        borderTop:'2px solid var(--border)',marginTop:8}}>
        <div>
          <span style={{fontSize:12,color:'var(--text2)'}}>ציון סופי: </span>
          <span style={{fontSize:28,fontWeight:900,color:calc>=35?'var(--red)':calc>=25?'var(--orange)':'var(--text)'}}>{calc}</span>
          <span style={{fontSize:12,color:'var(--text3)'}}> / 50</span>
        </div>
        <div style={{display:'flex',gap:4,fontSize:10,color:'var(--text3)'}}>
          <span>({impact}×3)</span>+<span>({delay}×3)</span>+<span>({effort}×2)</span>+<span>({energy}×2)</span>

      <button className="btn btn-primary" style={{width:'100%',marginTop:8}} onClick={apply}>
        ✓ השתמש בציון {calc}
      </button>
    </div>
  );
}

function WeeklySummaryScreen({history,tasks,weeklyPlan,schedule}){
  const today=new Date();
  const todayKey2=today.toISOString().split('T')[0];
  const weekStart=new Date(today);
  weekStart.setDate(today.getDate()-today.getDay());

  const wh=history.filter(h=>new Date(h.date)>=weekStart&&new Date(h.date)<=today);
  const done=wh.filter(h=>h.action==='done');
  const doneA=done.filter(h=>{const t=tasks.find(x=>x.id===h.taskId);return t?.rating==='A';}).length;
  const postponed=wh.filter(h=>h.action==='postponed').length;

  const pCounts={};
  wh.filter(h=>h.action==='postponed').forEach(h=>{pCounts[h.name]=(pCounts[h.name]||0)+1;});
  const patterns=Object.entries(pCounts).filter(([,c])=>c>1).sort((a,b)=>b[1]-a[1]);

  const dayData=DAYS.map((name,i)=>{
    const d=new Date(weekStart);d.setDate(weekStart.getDate()+i);
    const dk=d.toISOString().split('T')[0];
    return{name,done:history.filter(h=>h.date===dk&&h.action==='done').length};
  });
  const maxD=Math.max(...dayData.map(d=>d.done),1);

  // ── STREAK ────────────────────────────────────────────────
  let streak=0;
  const checkDate=new Date(today);
  for(let i=0;i<365;i++){
    const dk=checkDate.toISOString().split('T')[0];
    const hadA=history.some(h=>h.date===dk&&h.action==='done'&&tasks.find(t=>t.id===h.taskId&&t.rating==='A'));
    if(!hadA)break;
    streak++;
    checkDate.setDate(checkDate.getDate()-1);
  }

  // ── MONTHLY CALENDAR (5 weeks) ────────────────────────────
  const calStart=new Date(today);
  calStart.setDate(today.getDate()-today.getDay()-28); // go back to start 5 weeks ago (Sunday)
  const calDays=[];
  for(let i=0;i<35;i++){
    const d=new Date(calStart);d.setDate(calStart.getDate()+i);
    const dk=d.toISOString().split('T')[0];
    const isFuture=d>today;
    const isToday=dk===todayKey2;
    const doneAct=isFuture?0:history.filter(h=>h.date===dk&&h.action==='done'&&tasks.find(t=>t.id===h.taskId&&t.rating==='A')).length;
    const doneAll=isFuture?0:history.filter(h=>h.date===dk&&h.action==='done').length;
    calDays.push({d,dk,isFuture,isToday,doneA:doneAct,doneAll});
  }

  // ── FORECAST ──────────────────────────────────────────────
  const forecastTasks=tasks.filter(t=>
    ['A','B'].includes(t.rating)&&
    t.deadline&&t.deadline!=='weekly-thursday'&&
    daysLeft(t.deadline)<=60
  );

  function getSessionPace(taskId){
    const sessions=history.filter(h=>h.taskId===taskId&&h.action==='done');
    if(!sessions.length)return{count:0,perWeek:0,lastDate:null};
    const last14=new Date(today);last14.setDate(today.getDate()-14);
    const recent=sessions.filter(s=>new Date(s.date)>=last14).length;
    const sorted=sessions.slice().sort((a,b)=>a.date.localeCompare(b.date));
    const firstD=new Date(sorted[0].date);
    const daysElapsed=Math.max(1,Math.ceil((today-firstD)/86400000));
    const perDay=sessions.length/daysElapsed;
    return{count:sessions.length,perWeek:Math.round(perDay*7*10)/10,recent,lastDate:sorted[sorted.length-1].date};
  }

  function getRequiredPace(task){
    const tr=task.timeRequired||'';
    if(/\d+.*\/יום/.test(tr)){const m=tr.match(/(\d+(?:\.\d+)?)/);return m?parseFloat(m[1])*7:null;}
    if(/שבוע/.test(tr)){const m=tr.match(/(\d+)(?:-(\d+))?/);if(m){const v=m[2]?(parseInt(m[1])+parseInt(m[2]))/2:parseInt(m[1]);return v;}}
    return null;
  }

  function forecastStatus(pace,required,dl){
    if(dl<=3)return{color:'#EF4444',icon:'🆘',label:'קריטי'};
    if(!required)return dl<=7?{color:'#F97316',icon:'⚠️',label:'דחוף'}:{color:'var(--text3)',icon:'📊',label:'ללא נתונים'};
    const ratio=pace/required;
    if(ratio>=0.8)return{color:'#22C55E',icon:'✅',label:'בקצב'};
    if(ratio>=0.4)return{color:'#EAB308',icon:'⚡',label:'מאחר'};
    return{color:'#F97316',icon:'🔥',label:'רחוק מהיעד'};
  }

  return(
    <div className="fi">
      <h2 className="section-title">📈 סיכום שבועי</h2>

      {/* ── Stats row ── */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:14}}>
        <div className="card" style={{textAlign:'center'}}>
          <div style={{fontSize:36,fontWeight:900,color:'var(--green)'}}>{doneA}</div>
          <div style={{fontSize:11,color:'var(--text2)',marginTop:4}}>A הושלמו</div>
        </div>
        <div className="card" style={{textAlign:'center'}}>
          <div style={{fontSize:36,fontWeight:900,color:'var(--accent2)'}}>{done.length}</div>
          <div style={{fontSize:11,color:'var(--text2)',marginTop:4}}>סה"כ בוצע</div>
        </div>
        <div className="card" style={{textAlign:'center'}}>
          <div style={{fontSize:36,fontWeight:900,color:'var(--red)'}}>{postponed}</div>
          <div style={{fontSize:11,color:'var(--text2)',marginTop:4}}>נדחו</div>
        </div>
      </div>

      {/* ── Streak ── */}
      <div className="card" style={{marginBottom:14,background:streak>0?'linear-gradient(135deg,rgba(234,179,8,.08),rgba(249,115,22,.06))':'var(--card)',
        border:streak>0?'1px solid rgba(234,179,8,.3)':'1px solid var(--border)'}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{fontSize:48,lineHeight:1}}>{streak>0?'🔥':'💤'}</div>
          <div>
            <div style={{fontSize:28,fontWeight:900,color:streak>0?'#F97316':'var(--text3)'}}>
              {streak} {streak===1?'יום':'ימים'} רצוף{streak!==1?'ים':''}
            </div>
            <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>
              {streak===0?'התחל היום — השלם משימת A אחת לפחות':
               streak<3?'כל כך מתחיל! המשך מחר 💪':
               streak<7?`${streak} ימים רצופים! אתה בזרימה 🚀`:
               `${streak} ימים?! 🏆 אתה מכונה`}
            </div>
          </div>
          {streak>0&&(
            <div style={{marginRight:'auto',textAlign:'center'}}>
              <div style={{fontSize:11,color:'var(--text3)'}}>השבוע</div>
              <div style={{display:'flex',gap:3,marginTop:4}}>
                {DAYS.map((name,i)=>{
                  const d=new Date(weekStart);d.setDate(weekStart.getDate()+i);
                  const dk=d.toISOString().split('T')[0];
                  const hadA=history.some(h=>h.date===dk&&h.action==='done'&&tasks.find(t=>t.id===h.taskId&&t.rating==='A'));
                  const isFut=d>today;
                  return<div key={i} style={{width:12,height:12,borderRadius:3,

      </div>

      {/* ── Monthly Calendar ── */}
      <div className="card" style={{marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>📅 יומן 5 שבועות</div>

          {['א','ב','ג','ד','ה','ו','ש'].map(d=>(

            const border=isToday?'1px solid var(--accent)':isFuture?'1px solid transparent':'1px solid transparent';
